apiVersion: v1
kind: Namespace
metadata:
  name: vault
---
# WARNING: Using a shared RWMany volume for Raft storage across multiple Vault
# pods is not a HashiCorp recommended production pattern (each Raft node should
# have its own dedicated volume). This is provided to mirror the immich PV/PVC
# example. For production HA Raft, prefer dynamic provisioning (RWO) so each
# StatefulSet pod gets its own PVC. Adjust as needed.
apiVersion: v1
kind: PersistentVolume
metadata:
  name: vault-data-pv
spec:
  capacity:
    storage: 20Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  nfs:
    server: truenas.home
    path: /mnt/BasicPool/kubernetes/vault-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vault-data-pvc
  namespace: vault
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 20Gi
  storageClassName: ""
  volumeName: vault-data-pv
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: hashicorp
  namespace: vault
spec:
  interval: 5m
  url: https://helm.releases.hashicorp.com
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vault
  namespace: vault
spec:
  interval: 5m
  chart:
    spec:
      chart: vault
      version: 0.30.1 # synced with https://developer.hashicorp.com/vault/docs/deploy/kubernetes/helm (helm search repo hashicorp/vault)
      sourceRef:
        kind: HelmRepository
        name: hashicorp
      interval: 5m
  values:
    global:
      enabled: true
    server:
      ha:
        enabled: true
        replicas: 3
        raft:
          enabled: true
          setNodeId: true
      dataStorage:
        enabled: true
        existingClaim: vault-data-pvc
      auditStorage:
        enabled: false
      service:
        type: ClusterIP
      extraEnvironmentVars:
        VAULT_API_ADDR: "http://vault.vault.svc.cluster.local:8200"
      config: |
        ui = true
        listener "tcp" {
          address         = "0.0.0.0:8200"
          cluster_address = "0.0.0.0:8201"
          tls_disable     = 1
        }
        storage "raft" {
          path = "/vault/data"
        }
        service_registration "kubernetes" {}
    ui:
      enabled: true
    injector:
      enabled: true
    csi:
      enabled: false
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vault-ingress
  namespace: vault
  labels:
    app: vault
spec:
  rules:
    - host: vault.jacobbanghart.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vault
                port:
                  number: 8200
