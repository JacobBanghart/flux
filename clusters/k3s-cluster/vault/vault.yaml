apiVersion: v1
kind: Namespace
metadata:
  name: vault
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: hashicorp
  namespace: vault
spec:
  interval: 5m
  url: https://helm.releases.hashicorp.com
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vault
  namespace: vault
spec:
  interval: 5m
  chart:
    spec:
      chart: vault
      version: 0.30.1 # synced with https://developer.hashicorp.com/vault/docs/deploy/kubernetes/helm (helm search repo hashicorp/vault)
      sourceRef:
        kind: HelmRepository
        name: hashicorp
      interval: 5m
  values:
    global:
      enabled: true
    server:
      ha:
        enabled: true
        replicas: 3
        raft:
          enabled: true
          setNodeId: true
      dataStorage:
        enabled: true
        size: 20Gi
        storageClass: nfs-rwx
        labels:
          app: vault
          release: vault
      auditStorage:
        enabled: false
      service:
        type: ClusterIP
      extraEnvironmentVars:
        VAULT_API_ADDR: "http://vault.vault.svc.cluster.local:8200"
      config: |
        ui = true
        listener "tcp" {
          address         = "0.0.0.0:8200"
          cluster_address = "0.0.0.0:8201"
          tls_disable     = 1
        }
        storage "raft" {
          path = "/vault/data"
        }
        service_registration "kubernetes" {}
    ui:
      enabled: true
    injector:
      enabled: true
    csi:
      enabled: false
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vault-ingress
  namespace: vault
  labels:
    app: vault
spec:
  rules:
    - host: vault.jacobbanghart.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vault
                port:
                  number: 8200
