apiVersion: v1
kind: ConfigMap
metadata:
  name: postgresql-init
  namespace: wordpress-saas-portal
data:
  01-schema.sql: |
    -- WordPress SaaS Portal Database Schema

    -- Enable UUID extension
    CREATE EXTENSION IF NOT EXISTS "pgcrypto";

    -- Clients (users who pay for sites)
    CREATE TABLE IF NOT EXISTS clients (
        id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        email VARCHAR(255) UNIQUE NOT NULL,
        name VARCHAR(255) NOT NULL DEFAULT '',
        password_hash VARCHAR(255),
        stripe_customer_id VARCHAR(255),
        oauth_provider VARCHAR(50),
        oauth_id VARCHAR(255),
        created_at TIMESTAMPTZ NOT NULL DEFAULT NOW(),
        updated_at TIMESTAMPTZ NOT NULL DEFAULT NOW(),
        UNIQUE(oauth_provider, oauth_id)
    );

    -- Sites (WordPress instances)
    CREATE TABLE IF NOT EXISTS sites (
        id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        client_id UUID NOT NULL REFERENCES clients(id) ON DELETE CASCADE,
        name VARCHAR(63) NOT NULL,
        subdomain VARCHAR(63) NOT NULL,
        custom_domain VARCHAR(255),
        plan VARCHAR(20) NOT NULL DEFAULT 'basic',
        stripe_subscription_id VARCHAR(255),
        billing_status VARCHAR(20) NOT NULL DEFAULT 'pending',
        trial_ends_at TIMESTAMPTZ,
        provision_status VARCHAR(20) NOT NULL DEFAULT 'pending',
        provision_error TEXT,
        provisioned_at TIMESTAMPTZ,
        dns_verified BOOLEAN NOT NULL DEFAULT FALSE,
        dns_verified_at TIMESTAMPTZ,
        created_at TIMESTAMPTZ NOT NULL DEFAULT NOW(),
        updated_at TIMESTAMPTZ NOT NULL DEFAULT NOW(),
        CONSTRAINT sites_name_unique UNIQUE(name),
        CONSTRAINT sites_subdomain_unique UNIQUE(subdomain),
        CONSTRAINT sites_plan_check CHECK (plan IN ('basic', 'pro', 'enterprise')),
        CONSTRAINT sites_billing_status_check CHECK (billing_status IN ('pending', 'trial', 'active', 'past_due', 'cancelled')),
        CONSTRAINT sites_provision_status_check CHECK (provision_status IN ('pending', 'provisioning', 'ready', 'failed', 'deleting', 'deleted'))
    );

    -- Provision queue
    CREATE TABLE IF NOT EXISTS provision_queue (
        id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        site_id UUID NOT NULL REFERENCES sites(id) ON DELETE CASCADE,
        action VARCHAR(20) NOT NULL,
        payload JSONB DEFAULT '{}',
        status VARCHAR(20) NOT NULL DEFAULT 'pending',
        attempts INT NOT NULL DEFAULT 0,
        max_attempts INT NOT NULL DEFAULT 3,
        last_error TEXT,
        created_at TIMESTAMPTZ NOT NULL DEFAULT NOW(),
        processed_at TIMESTAMPTZ,
        CONSTRAINT provision_queue_action_check CHECK (action IN ('create', 'upgrade', 'delete')),
        CONSTRAINT provision_queue_status_check CHECK (status IN ('pending', 'processing', 'completed', 'failed'))
    );

    -- Payments history
    CREATE TABLE IF NOT EXISTS payments (
        id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        client_id UUID NOT NULL REFERENCES clients(id) ON DELETE CASCADE,
        site_id UUID REFERENCES sites(id) ON DELETE SET NULL,
        stripe_payment_intent_id VARCHAR(255),
        stripe_invoice_id VARCHAR(255),
        amount_cents INT NOT NULL,
        currency VARCHAR(3) NOT NULL DEFAULT 'usd',
        status VARCHAR(20) NOT NULL,
        description TEXT,
        created_at TIMESTAMPTZ NOT NULL DEFAULT NOW()
    );

    -- Indexes
    CREATE INDEX IF NOT EXISTS idx_sites_client_id ON sites(client_id);
    CREATE INDEX IF NOT EXISTS idx_sites_provision_status ON sites(provision_status);
    CREATE INDEX IF NOT EXISTS idx_provision_queue_pending ON provision_queue(status, created_at) WHERE status = 'pending';
    CREATE INDEX IF NOT EXISTS idx_provision_queue_site_id ON provision_queue(site_id);
    CREATE INDEX IF NOT EXISTS idx_payments_client_id ON payments(client_id);
    CREATE INDEX IF NOT EXISTS idx_clients_email ON clients(email);
    CREATE INDEX IF NOT EXISTS idx_clients_stripe_customer_id ON clients(stripe_customer_id);

    -- LISTEN/NOTIFY trigger
    CREATE OR REPLACE FUNCTION notify_provision_queue()
    RETURNS TRIGGER AS $$
    BEGIN
        PERFORM pg_notify('provision_queue', json_build_object(
            'id', NEW.id,
            'site_id', NEW.site_id,
            'action', NEW.action
        )::text);
        RETURN NEW;
    END;
    $$ LANGUAGE plpgsql;

    DROP TRIGGER IF EXISTS provision_queue_notify ON provision_queue;
    CREATE TRIGGER provision_queue_notify
        AFTER INSERT ON provision_queue
        FOR EACH ROW
        EXECUTE FUNCTION notify_provision_queue();

    -- Updated_at trigger
    CREATE OR REPLACE FUNCTION update_updated_at()
    RETURNS TRIGGER AS $$
    BEGIN
        NEW.updated_at = NOW();
        RETURN NEW;
    END;
    $$ LANGUAGE plpgsql;

    DROP TRIGGER IF EXISTS clients_updated_at ON clients;
    CREATE TRIGGER clients_updated_at
        BEFORE UPDATE ON clients
        FOR EACH ROW
        EXECUTE FUNCTION update_updated_at();

    DROP TRIGGER IF EXISTS sites_updated_at ON sites;
    CREATE TRIGGER sites_updated_at
        BEFORE UPDATE ON sites
        FOR EACH ROW
        EXECUTE FUNCTION update_updated_at();

    -- Helper view
    CREATE OR REPLACE VIEW sites_with_client AS
    SELECT
        s.*,
        c.email AS client_email,
        c.name AS client_name
    FROM sites s
    JOIN clients c ON s.client_id = c.id;
