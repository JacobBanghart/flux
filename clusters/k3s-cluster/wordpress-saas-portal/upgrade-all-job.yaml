apiVersion: batch/v1
kind: Job
metadata:
  name: upgrade-all-sites
  namespace: wordpress-saas-portal
  labels:
    app: upgrade-all
spec:
  ttlSecondsAfterFinished: 3600  # Auto-delete after 1 hour
  backoffLimit: 0  # Don't retry on failure
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: upgrade-all
          image: registry.gitlab.com/jacobmbanghart/wordpress-saas-portal/upgrade-all:latest
          args: ["--dry-run=false"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: portal-secrets
                  key: database-url
            - name: STRIPE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: portal-secrets
                  key: stripe-secret-key
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
      imagePullSecrets:
        - name: regcred
