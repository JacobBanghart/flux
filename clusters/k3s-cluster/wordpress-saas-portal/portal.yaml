apiVersion: v1
kind: Service
metadata:
  name: portal
  namespace: wordpress-saas-portal
  labels:
    app: portal
spec:
  ports:
    - port: 8080
      targetPort: 8080
      name: http
  selector:
    app: portal
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: portal
  namespace: wordpress-saas-portal
spec:
  replicas: 2
  selector:
    matchLabels:
      app: portal
  template:
    metadata:
      labels:
        app: portal
    spec:
      serviceAccountName: portal
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: portal
          image: registry.gitlab.com/jacobmbanghart/wordpress-saas-portal/portal:20260322041103-d6b6ab6f # {"$imagepolicy": "flux-system:wordpress-saas-portal"}
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: PORT
              value: "8080"
            - name: ENVIRONMENT
              value: "production"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: portal-secrets
                  key: database-url
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: portal-secrets
                  key: session-secret
            - name: BASE_URL
              value: "https://portal.jacobbanghart.com"
            - name: CLIENT_DOMAIN_SUFFIX
              value: "clients.jacobbanghart.com"
            - name: INGRESS_HOST
              value: "ingress.jacobbanghart.com"
            # OAuth - Google
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: portal-secrets
                  key: google-client-id
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: portal-secrets
                  key: google-client-secret
            # OAuth - GitHub
            - name: GITHUB_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: portal-secrets
                  key: github-client-id
            - name: GITHUB_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: portal-secrets
                  key: github-client-secret
            # Stripe
            - name: STRIPE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: portal-secrets
                  key: stripe-secret-key
            - name: STRIPE_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: portal-secrets
                  key: stripe-webhook-secret
            - name: STRIPE_PRICE_BASIC
              valueFrom:
                secretKeyRef:
                  name: portal-secrets
                  key: stripe-price-basic
            - name: STRIPE_PRICE_PRO
              valueFrom:
                secretKeyRef:
                  name: portal-secrets
                  key: stripe-price-pro
            - name: STRIPE_PRICE_ENTERPRISE
              valueFrom:
                secretKeyRef:
                  name: portal-secrets
                  key: stripe-price-enterprise
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
