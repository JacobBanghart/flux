apiVersion: batch/v1
kind: CronJob
metadata:
  name: subscription-reconciler
  namespace: wordpress-saas-portal
spec:
  # Run every 4 hours
  schedule: "0 */4 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 300 # 5 minute timeout
      template:
        spec:
          restartPolicy: Never
          imagePullSecrets:
            - name: regcred
          containers:
            - name: reconciler
              image: registry.gitlab.com/jacobmbanghart/wordpress-saas-portal/reconciler:20260322041103-d6b6ab6f # {"$imagepolicy": "flux-system:wordpress-saas-reconciler"}
              imagePullPolicy: Always
              # Run with --dry-run=false to actually cancel orphans
              args: ["--dry-run=false"]
              env:
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: portal-secrets
                      key: database-url
                - name: STRIPE_SECRET_KEY
                  valueFrom:
                    secretKeyRef:
                      name: portal-secrets
                      key: stripe-secret-key
              resources:
                requests:
                  memory: "64Mi"
                  cpu: "50m"
                limits:
                  memory: "128Mi"
                  cpu: "200m"
