apiVersion: apps/v1
kind: Deployment
metadata:
  name: provisioner
  namespace: wordpress-saas-portal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: provisioner
  strategy:
    type: Recreate # Only one provisioner at a time
  template:
    metadata:
      labels:
        app: provisioner
    spec:
      serviceAccountName: provisioner
      initContainers:
        # Git-sync to clone the Helm chart repo
        - name: git-sync
          image: registry.k8s.io/git-sync/git-sync:v4.2.1
          args:
            - --repo=https://github.com/JacobBanghart/WordpressHelm.git
            - --root=/charts
            - --one-time
          volumeMounts:
            - name: helm-charts
              mountPath: /charts
          securityContext:
            runAsUser: 65534
            runAsGroup: 65534
      containers:
        - name: provisioner
          image: registry.gitlab.com/jacobmbanghart/wordpress-saas-portal/provisioner:20251215022727-0508eb59 # {"$imagepolicy": "flux-system:wordpress-saas-provisioner"}
          imagePullPolicy: Always
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: portal-secrets
                  key: database-url
            - name: HELM_CHART_PATH
              value: "/charts/WordpressHelm.git"
            - name: CLIENT_DOMAIN_SUFFIX
              value: "clients.jacobbanghart.com"
          volumeMounts:
            - name: helm-charts
              mountPath: /charts
              readOnly: true
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
          # Provisioner is a long-running worker, use exec probe
          livenessProbe:
            exec:
              command:
                - cat
                - /tmp/healthy
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            exec:
              command:
                - cat
                - /tmp/healthy
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: helm-charts
          emptyDir: {}
---
# ServiceAccount for provisioner with Helm/K8s permissions
apiVersion: v1
kind: ServiceAccount
metadata:
  name: provisioner
  namespace: wordpress-saas-portal
---
# ClusterRole for provisioner to manage namespaces and Helm releases
#
# SECURITY NOTES (2024-12-09):
# - This role has cluster-wide permissions because it dynamically provisions
#   client WordPress instances in NEW namespaces (can't use namespace-scoped Roles)
# - The provisioner application MUST only operate on namespaces with label:
#   app.kubernetes.io/managed-by=wordpress-saas
# - Delete permissions scoped to only what Helm teardown requires
#
# PERMISSIONS REMOVED (tightened from original):
# - LimitRanges, ResourceQuotas - not used by Helm chart
# - NetworkPolicies - Flannel CNI doesn't enforce them
# - Roles/RoleBindings - prevents privilege escalation attacks
# - ServiceAccounts - WordPress pods use default SA
# - Jobs - not used by Helm chart
# - ReplicaSets write access - managed by Deployments (read-only now)
# - Cluster-wide delete on secrets/configmaps - now read/create/update only
#
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: wordpress-saas-provisioner
rules:
  # Namespace management - required for multi-tenant provisioning
  # Delete allowed: cascades to delete all resources in namespace
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch", "create", "delete"]
  # Secrets for Helm release metadata - no delete (namespace delete cascades)
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  # ConfigMaps for Helm and WordPress config - no delete (namespace delete cascades)
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  # Services for WordPress pods - no delete (namespace delete cascades)
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  # PVCs for WordPress storage - no delete (namespace delete cascades)
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  # Pods (read-only for status checks)
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  # Pod logs for debugging client issues
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list"]
  # Deployments/StatefulSets - no delete (namespace delete cascades)
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  # ReplicaSets (read-only, managed by Deployments)
  - apiGroups: ["apps"]
    resources: ["replicasets"]
    verbs: ["get", "list", "watch"]
  # Ingress for client domains - no delete (namespace delete cascades)
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  # NetworkPolicies - required by Helm chart (even though Flannel doesn't enforce them)
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  # ResourceQuotas - required by Helm chart for client resource limits
  - apiGroups: [""]
    resources: ["resourcequotas"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  # LimitRanges - required by Helm chart for container defaults
  - apiGroups: [""]
    resources: ["limitranges"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: wordpress-saas-provisioner
subjects:
  - kind: ServiceAccount
    name: provisioner
    namespace: wordpress-saas-portal
roleRef:
  kind: ClusterRole
  name: wordpress-saas-provisioner
  apiGroup: rbac.authorization.k8s.io
