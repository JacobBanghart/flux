apiVersion: apps/v1
kind: Deployment
metadata:
  name: provisioner
  namespace: wordpress-saas-portal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: provisioner
  strategy:
    type: Recreate  # Only one provisioner at a time
  template:
    metadata:
      labels:
        app: provisioner
    spec:
      serviceAccountName: provisioner
      initContainers:
        # Git-sync to clone the Helm chart repo
        - name: git-sync
          image: registry.k8s.io/git-sync/git-sync:v4.2.1
          args:
            - --repo=https://github.com/JacobBanghart/WordpressHelm.git
            - --root=/charts
            - --one-time
          volumeMounts:
            - name: helm-charts
              mountPath: /charts
          securityContext:
            runAsUser: 65534
            runAsGroup: 65534
      containers:
        - name: provisioner
          image: registry.gitlab.com/jacobmbanghart/wordpress-saas-portal/provisioner:latest
          imagePullPolicy: Always
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: portal-secrets
                  key: database-url
            - name: HELM_CHART_PATH
              value: "/charts/WordpressHelm.git"
            - name: CLIENT_DOMAIN_SUFFIX
              value: "clients.jacobbanghart.com"
          volumeMounts:
            - name: helm-charts
              mountPath: /charts
              readOnly: true
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
      volumes:
        - name: helm-charts
          emptyDir: {}
---
# ServiceAccount for provisioner with Helm/K8s permissions
apiVersion: v1
kind: ServiceAccount
metadata:
  name: provisioner
  namespace: wordpress-saas-portal
---
# ClusterRole for provisioner to manage namespaces and Helm releases
#
# SECURITY NOTES (2024-12-09):
# - This role has cluster-wide permissions because it dynamically provisions
#   client WordPress instances in NEW namespaces (can't use namespace-scoped Roles)
# - The provisioner application should only operate on namespaces with label:
#   app.kubernetes.io/managed-by=wordpress-saas
#
# PERMISSIONS REMOVED (tightened from original):
# - LimitRanges, ResourceQuotas - not used by Helm chart
# - NetworkPolicies - Flannel CNI doesn't enforce them
# - Roles/RoleBindings - prevents privilege escalation attacks
# - ServiceAccounts - WordPress pods use default SA
# - Jobs - not used by Helm chart
# - ReplicaSets write access - managed by Deployments (read-only now)
#
# TO ADD BACK IF NEEDED:
# - Jobs: apiGroups: ["batch"], resources: ["jobs"], verbs: ["get","list","watch","create","update","patch","delete"]
# - ServiceAccounts: apiGroups: [""], resources: ["serviceaccounts"], verbs: ["get","list","watch","create","delete"]
#
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: wordpress-saas-provisioner
rules:
  # Namespace management - required for multi-tenant provisioning
  # Provisioner should only target namespaces with specific labels
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch", "create", "delete"]
  # Secrets for Helm release metadata (stored in release namespace)
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # ConfigMaps for Helm and WordPress config
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Services for WordPress pods
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # PVCs for WordPress storage
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Pods (read-only for status checks)
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  # Pod logs for debugging client issues
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list"]
  # Deployments/StatefulSets for WordPress
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # ReplicaSets (read-only, managed by Deployments)
  - apiGroups: ["apps"]
    resources: ["replicasets"]
    verbs: ["get", "list", "watch"]
  # Ingress for client domains
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: wordpress-saas-provisioner
subjects:
  - kind: ServiceAccount
    name: provisioner
    namespace: wordpress-saas-portal
roleRef:
  kind: ClusterRole
  name: wordpress-saas-provisioner
  apiGroup: rbac.authorization.k8s.io
