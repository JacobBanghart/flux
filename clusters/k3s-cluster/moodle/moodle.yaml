apiVersion: v1
kind: Namespace
metadata:
  name: moodle
---
apiVersion: v1
kind: Service
metadata:
  name: moodle
  namespace: moodle
spec:
  type: ClusterIP
  ports:
    - port: 8079
      targetPort: 8079
---
apiVersion: v1
kind: Endpoints
metadata:
  name: moodle
  namespace: moodle
subsets:
  - addresses:
      - ip: 192.168.1.34
    ports:
      - port: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: moodle
  namespace: moodle
  labels:
    name: moodle
spec:
  rules:
    - host: moodle.jacobbanghart.com
      http:
        paths:
          - pathType: Prefix
            path: "/"
            backend:
              service:
                name: moodle
                port:
                  number: 8079
