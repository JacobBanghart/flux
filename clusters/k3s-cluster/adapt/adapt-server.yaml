apiVersion: v1
kind: Namespace
metadata:
  name: adapt-out
---
apiVersion: v1
kind: Service
metadata:
  name: adapt-out
  namespace: adapt-out
spec:
  type: ClusterIP
  ports:
    - port: 8090
      targetPort: 8090
---
apiVersion: v1
kind: Endpoints
metadata:
  name: adapt-out
  namespace: adapt-out
subsets:
  - addresses:
      - ip: 192.168.1.34
    ports:
      - port: 8090
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: adapt-out
  namespace: adapt-out
  labels:
    name: adapt-out
spec:
  rules:
    - host: adapt-out.jacobbanghart.com
      http:
        paths:
          - pathType: Prefix
            path: "/"
            backend:
              service:
                name: adapt-out
                port:
                  number: 8090
