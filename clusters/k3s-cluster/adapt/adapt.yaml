apiVersion: v1
kind: Namespace
metadata:
  name: adapt
---
apiVersion: v1
kind: Service
metadata:
  name: adapt
  namespace: adapt
spec:
  type: ClusterIP
  ports:
    - port: 5001
      targetPort: 5001
---
apiVersion: v1
kind: Endpoints
metadata:
  name: adapt
  namespace: adapt
subsets:
  - addresses:
      - ip: 192.168.1.34
    ports:
      - port: 5001
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: adapt
  namespace: adapt
  labels:
    name: adapt
spec:
  rules:
    - host: adapt.jacobbanghart.com
      http:
        paths:
          - pathType: Prefix
            path: "/"
            backend:
              service:
                name: adapt
                port:
                  number: 5001
