apiVersion: v1
kind: Namespace
metadata:
  name: mealie
---
apiVersion: v1
kind: Service
metadata:
  name: mealie-svc
  namespace: mealie
spec:
  type: ClusterIP
  ports:
    - port: 18006
      targetPort: 18006
---
apiVersion: v1
kind: Endpoints
metadata:
  name: mealie-endpoint
  namespace: mealie
subsets:
  - addresses:
      - ip: 192.168.1.34
    ports:
      - port: 18006
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mealie-ingress
  namespace: mealie
  labels:
    name: mealie-ingress
spec:
  rules:
    - host: mealie.jacobbanghart.com
      http:
        paths:
          - pathType: Prefix
            path: "/"
            backend:
              service:
                name: mealie-svc
                port:
                  number: 18006
