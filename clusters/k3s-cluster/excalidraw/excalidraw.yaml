apiVersion: v1
kind: Namespace
metadata:
  name: excalidraw
---
# Migrated to k8s-homelab (Wave 1, see k8s-homelab's docs/decisions.md).
# Scaled to 0 rather than deleted -- fast rollback path if needed. The
# Ingress below (excalidraw.jacobbanghart.com, dev's external-dns owns
# this DNS record) was removed so that record releases and
# k8s-homelab's external-dns can claim it; recreating it here would
# take DNS back from k8s-homelab on rollback, which is fine and
# intentional if actually needed.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: excalidraw
  namespace: excalidraw
spec:
  replicas: 0
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: excalidraw
  template:
    metadata:
      labels:
        app: excalidraw
    spec:
      # Note: Excalidraw uses nginx which requires root privileges
      containers:
        - name: excalidraw
          image: excalidraw/excalidraw:sha-4bfc5bb
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              memory: "1024Mi"
              cpu: "1000m"
          ports:
            - containerPort: 80
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: excalidraw
  namespace: excalidraw
spec:
  selector:
    app: excalidraw
  ports:
    - port: 5000
      targetPort: 80
      name: excalidraw
