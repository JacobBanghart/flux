apiVersion: v1
kind: Namespace
metadata:
  name: sentry
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: sentry-clickhouse-config
  namespace: sentry
data:
  experimental.xml: |
    <clickhouse>
      <listen_host>0.0.0.0</listen_host>
      <profiles>
        <default>
          <allow_experimental_json_type>1</allow_experimental_json_type>
        </default>
      </profiles>
      <settings>
        <allow_experimental_json_type>1</allow_experimental_json_type>
      </settings>
    </clickhouse>
  users_experimental.xml: |
    <clickhouse>
      <profiles>
        <default>
          <allow_experimental_json_type>1</allow_experimental_json_type>
        </default>
      </profiles>
    </clickhouse>
---
# ── ClickHouse for Sentry (chart 30.x removed the bundled subchart) ────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sentry-clickhouse-data
  namespace: sentry
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: nfs-rwx
  resources:
    requests:
      storage: 50Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: sentry-clickhouse
  namespace: sentry
spec:
  serviceName: sentry-clickhouse
  replicas: 1
  selector:
    matchLabels:
      app: sentry-clickhouse
  template:
    metadata:
      labels:
        app: sentry-clickhouse
    spec:
      containers:
        - name: clickhouse
          image: altinity/clickhouse-server:25.3.6.10034.altinitystable
          ports:
            - containerPort: 8123  # HTTP
            - containerPort: 9000  # native TCP
          env:
            - name: CLICKHOUSE_DB
              value: default
            - name: CLICKHOUSE_USER
              value: default
            - name: CLICKHOUSE_PASSWORD
              value: ""
            - name: CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT
              value: "1"
          volumeMounts:
            - name: data
              mountPath: /var/lib/clickhouse
            - name: ch-config
              mountPath: /etc/clickhouse-server/config.d/experimental.xml
              subPath: experimental.xml
            - name: ch-config
              mountPath: /etc/clickhouse-server/users.d/users_experimental.xml
              subPath: users_experimental.xml
          resources:
            requests:
              memory: "2Gi"
              cpu: "1000m"
            limits:
              memory: "8Gi"
              cpu: "4000m"
          readinessProbe:
            httpGet:
              path: /ping
              port: 8123
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: sentry-clickhouse-data
        - name: ch-config
          configMap:
            name: sentry-clickhouse-config
---
apiVersion: v1
kind: Service
metadata:
  name: sentry-clickhouse
  namespace: sentry
spec:
  clusterIP: None  # headless — required by StatefulSet serviceName for DNS
  selector:
    app: sentry-clickhouse
  ports:
    - name: http
      port: 8123
      targetPort: 8123
    - name: tcp
      port: 9000
      targetPort: 9000
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: sentry
  namespace: sentry
spec:
  interval: 1h
  url: https://sentry-kubernetes.github.io/charts
