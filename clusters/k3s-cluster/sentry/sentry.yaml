apiVersion: v1
kind: Namespace
metadata:
  name: sentry
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: sentry-clickhouse-config
  namespace: sentry
data:
  experimental.xml: |
    <clickhouse>
      <listen_host>0.0.0.0</listen_host>
      <profiles>
        <default>
          <allow_experimental_json_type>1</allow_experimental_json_type>
        </default>
      </profiles>
      <settings>
        <allow_experimental_json_type>1</allow_experimental_json_type>
      </settings>
    </clickhouse>
  users_experimental.xml: |
    <clickhouse>
      <profiles>
        <default>
          <allow_experimental_json_type>1</allow_experimental_json_type>
        </default>
      </profiles>
    </clickhouse>
---
# ── ClickHouse for Sentry (chart 30.x removed the bundled subchart) ────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sentry-clickhouse-data
  namespace: sentry
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: nfs-rwx
  resources:
    requests:
      storage: 50Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: sentry-clickhouse
  namespace: sentry
spec:
  serviceName: sentry-clickhouse
  replicas: 1
  selector:
    matchLabels:
      app: sentry-clickhouse
  template:
    metadata:
      labels:
        app: sentry-clickhouse
    spec:
      containers:
        - name: clickhouse
          image: clickhouse/clickhouse-server:24.8
          ports:
            - containerPort: 8123  # HTTP
            - containerPort: 9000  # native TCP
          env:
            - name: CLICKHOUSE_DB
              value: default
            - name: CLICKHOUSE_USER
              value: default
            - name: CLICKHOUSE_PASSWORD
              value: ""
            - name: CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT
              value: "1"
          volumeMounts:
            - name: data
              mountPath: /var/lib/clickhouse
            - name: ch-config
              mountPath: /etc/clickhouse-server/config.d/experimental.xml
              subPath: experimental.xml
            - name: ch-config
              mountPath: /etc/clickhouse-server/users.d/users_experimental.xml
              subPath: users_experimental.xml
          readinessProbe:
            httpGet:
              path: /ping
              port: 8123
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: sentry-clickhouse-data
        - name: ch-config
          configMap:
            name: sentry-clickhouse-config
---
apiVersion: v1
kind: Service
metadata:
  name: sentry-clickhouse
  namespace: sentry
spec:
  clusterIP: None  # headless — required by StatefulSet serviceName for DNS
  selector:
    app: sentry-clickhouse
  ports:
    - name: http
      port: 8123
      targetPort: 8123
    - name: tcp
      port: 9000
      targetPort: 9000
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: sentry
  namespace: sentry
spec:
  interval: 1h
  url: https://sentry-kubernetes.github.io/charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sentry
  namespace: sentry
spec:
  interval: 10m
  timeout: 30m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chart:
    spec:
      chart: sentry
      version: "30.x"
      sourceRef:
        kind: HelmRepository
        name: sentry
      interval: 1h
  values:
    # Secrets required before install:
    #   kubectl create secret generic sentry-secret -n sentry \
    #     --from-literal=my-secret-key=<random-50-char-string>
    #
    #   kubectl create secret generic sentry-postgres-secret -n sentry \
    #     --from-literal=postgres-password=<password>

    # Run migrations manually after install to avoid hook Job retry race conditions
    # that leave ClickHouse migrations stuck in_progress.
    asHook: false

    relay:
      strategyType: Recreate

    sentry:
      existingSecret: sentry-secret
      existingSecretKey: my-secret-key
      web:
        strategyType: Recreate

    system:
      adminEmail: admin@backtosafety.app
      url: https://sentry.backtosafety.app

    ingress:
      enabled: true
      ingressClassName: traefik
      regexPathStyle: traefik
      hostname: sentry.backtosafety.app
      annotations:
        traefik.ingress.kubernetes.io/router.entrypoints: websecure
        traefik.ingress.kubernetes.io/router.tls.certresolver: cloudflare

    # Disable bundled nginx — traefik is the cluster ingress controller
    nginx:
      enabled: false

    # chart 30.x removed the bundled ClickHouse subchart; point at our StatefulSet
    clickhouse:
      enabled: false
    externalClickhouse:
      host: sentry-clickhouse
      tcpPort: 9000
      httpPort: 8123
      username: default
      password: ""
      database: default
      singleNode: true

    postgresql:
      enabled: true
      auth:
        existingSecret: sentry-postgres-secret
        secretKeys:
          adminPasswordKey: postgres-password
      persistence:
        enabled: true
        size: 20Gi
        storageClass: nfs-rwx

    redis:
      enabled: true
      master:
        persistence:
          storageClass: nfs-rwx

    kafka:
      enabled: true
      # Single-node cluster: reduce replication factor from the default of 3
      provisioning:
        replicationFactor: 1
      controller:
        replicaCount: 1
        persistence:
          storageClass: nfs-rwx
