apiVersion: v1
kind: Namespace
metadata:
  name: dns-fixer
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: dns-fixer
  namespace: dns-fixer
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: dns-fixer-patch-services
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: [""]
    resources: ["nodes/status"]
    verbs: ["patch", "update"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: dns-fixer-patch-services
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: dns-fixer-patch-services
subjects:
  - kind: ServiceAccount
    name: dns-fixer
    namespace: dns-fixer
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: update-node-externalip
  namespace: dns-fixer
spec:
  schedule: "*/5 * * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          restartPolicy: OnFailure
          serviceAccountName: dns-fixer
          containers:
            - name: updater
              image: alpine:3.20
              imagePullPolicy: IfNotPresent
              env:
                - name: INGRESS_LABELS
                  value: "app.kubernetes.io/name=traefik,app.kubernetes.io/name=ingress-nginx"
              command:
                - /bin/sh
                - -ec
                - |
                  set -o pipefail
                  apk add --no-cache curl kubectl jq >/dev/null
                  WAN_IP=$(curl -fsS --max-time 4 https://ifconfig.me || curl -fsS --max-time 4 https://api.ipify.org)
                  if [ -z "$WAN_IP" ]; then
                    echo "Failed to determine WAN IP"
                    exit 1
                  fi
                  echo "WAN IP: $WAN_IP"
                  # Discover nodes running ingress controller pods
                  NODES=""
                  OLDIFS=$IFS; IFS=','
                  for sel in $INGRESS_LABELS; do
                    [ -z "$sel" ] && continue
                    found=$(kubectl get pods -A -l "$sel" -o jsonpath='{range .items[*]}{.spec.nodeName}{"\n"}{end}' 2>/dev/null | sort -u)
                    if [ -n "$found" ]; then
                      NODES="$NODES\n$found"
                    fi
                  done
                  IFS=$OLDIFS
                  NODES=$(printf "%s\n" $NODES | sed '/^$/d' | sort -u)
                  if [ -z "$NODES" ]; then
                    echo "No ingress pods found by labels; defaulting to control-plane nodes"
                    NODES=$(kubectl get nodes -l node-role.kubernetes.io/control-plane -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{end}' || true)
                  fi
                  if [ -z "$NODES" ]; then
                    echo "ERROR: No candidate nodes found to patch"
                    exit 1
                  fi
                  for node in $NODES; do
                    echo "Processing node: $node"
                    current=$(kubectl get node "$node" -o json | jq -r '.status.addresses[]? | select(.type=="ExternalIP") | .address' || true)
                    if [ "$current" = "$WAN_IP" ]; then
                      echo "Node $node already has ExternalIP $WAN_IP"
                      continue
                    fi
                    echo "Patching node $node ExternalIP -> $WAN_IP"
                    kubectl get node "$node" -o json \
                      | jq '.status.addresses = ([.status.addresses[] | select(.type!="ExternalIP")] + [{"type":"ExternalIP","address":"'"$WAN_IP"'"}])' \
                      | kubectl replace --raw "/api/v1/nodes/$node/status" -f -
                  done
                  echo "Done"
