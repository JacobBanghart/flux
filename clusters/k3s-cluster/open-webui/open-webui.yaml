apiVersion: v1
kind: Namespace
metadata:
  name: open-webui
---
apiVersion: source.toolkit.fluxcd.io/v1beta1
kind: HelmRepository
metadata:
  name: open-webui
  namespace: open-webui
spec:
  interval: 5m
  url: https://helm.openwebui.com/
---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: open-webui
  namespace: open-webui
spec:
  interval: 5m
  chart:
    spec:
      chart: open-webui
      version: 5.4.0
      sourceRef:
        kind: HelmRepository
        name: open-webui
      interval: 5m
  values:
    ollamaUrls:
      - ollama.jacobbanghart.com
    ollama:
      enabled: false
    ingress:
      enabled: true
      host: open-webui.jacobbanghart.com
