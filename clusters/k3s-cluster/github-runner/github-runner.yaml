---
# actions-runner-controller (ARC) — GitHub Actions self-hosted runners on k3s
# Authenticates via GitHub App (no PAT expiry issues)
# Docs: https://github.com/actions/actions-runner-controller
#
# Deployment order:
#   1. This file: HelmRepository + HelmRelease (installs controller + CRDs)
#   2. github-runners-kustomization.yaml: Kustomization with dependsOn this HelmRelease
#   3. runners/: RunnerDeployment + HorizontalRunnerAutoscaler (CRD-dependent resources)
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: actions-runner-controller
  namespace: flux-system
spec:
  interval: 1h
  url: https://actions-runner-controller.github.io/actions-runner-controller
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: actions-runner-controller
  namespace: actions-runner-system
spec:
  interval: 10m
  chart:
    spec:
      chart: actions-runner-controller
      version: "0.23.7"
      sourceRef:
        kind: HelmRepository
        name: actions-runner-controller
        namespace: flux-system
  values:
    authSecret:
      create: false
      name: controller-manager-secret

    # GitHub App authentication — secret applied manually from serverk8sdeploywithk3s/
    # See serverk8sdeploywithk3s/github-runner.secret.yaml for the template

    replicaCount: 1

    resources:
      limits:
        cpu: 500m
        memory: 500Mi
      requests:
        cpu: 100m
        memory: 128Mi

    # Cert manager is not deployed; use the built-in cert rotation
    certManagerEnabled: false

    # ARC metrics-addr binds to 127.0.0.1:8080 (loopback) — not scrapeable from otelDeployment.
    # kube-rbac-proxy exposes metrics externally on 8443 (TLS+RBAC) which requires credentials.
    # Skipping metrics scraping for ARC until --metrics-addr=0.0.0.0:8080 is configured.
---
# This Kustomization depends on the HelmRelease above being Ready before
# applying the CRD-dependent runner resources in ./runners/
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: github-runners
  namespace: flux-system
spec:
  interval: 10m
  path: ./apps/github-runners
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: flux-system
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: actions-runner-controller
      namespace: actions-runner-system
