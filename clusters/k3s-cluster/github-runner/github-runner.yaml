---
# actions-runner-controller (ARC) — GitHub Actions self-hosted runners on k3s
# Authenticates via GitHub App (no PAT expiry issues)
# Docs: https://github.com/actions/actions-runner-controller
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: actions-runner-controller
  namespace: flux-system
spec:
  interval: 1h
  url: https://actions-runner-controller.github.io/actions-runner-controller
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: actions-runner-controller
  namespace: actions-runner-system
spec:
  interval: 10m
  chart:
    spec:
      chart: actions-runner-controller
      version: "0.23.7"
      sourceRef:
        kind: HelmRepository
        name: actions-runner-controller
        namespace: flux-system
  values:
    authSecret:
      create: false
      name: controller-manager-secret

    # GitHub App authentication — secret applied manually from serverk8sdeploywithk3s/
    # See serverk8sdeploywithk3s/github-runner.secret.yaml for the template

    replicaCount: 1

    resources:
      limits:
        cpu: 200m
        memory: 256Mi
      requests:
        cpu: 100m
        memory: 128Mi

    # Cert manager is not deployed; use the built-in cert rotation
    certManagerEnabled: false
---
# Runner for wordpress-saas-portal
apiVersion: actions.summerwind.dev/v1alpha1
kind: RunnerDeployment
metadata:
  name: wordpress-saas-portal-runner
  namespace: actions-runner-system
spec:
  replicas: 1
  template:
    spec:
      # Scoped to this specific repo — does not grant access to other repos
      repository: jacobmbanghart/wordpress-saas-portal
      labels:
        - self-hosted
        - linux
      # Docker-in-Docker for image builds (build.yaml uses docker/build-push-action)
      dockerEnabled: true
      resources:
        limits:
          cpu: "4"
          memory: 6Gi
        requests:
          cpu: "2"
          memory: 2Gi
      # Ephemeral runners — each job gets a fresh runner pod
      ephemeral: true
---
# HorizontalRunnerAutoscaler for wordpress-saas-portal
# Scales 1→4 based on queued/in-progress jobs; idles back to 1
apiVersion: actions.summerwind.dev/v1alpha1
kind: HorizontalRunnerAutoscaler
metadata:
  name: wordpress-saas-portal-runner-autoscaler
  namespace: actions-runner-system
spec:
  scaleTargetRef:
    name: wordpress-saas-portal-runner
  minReplicas: 1
  maxReplicas: 4
  metrics:
    - type: TotalNumberOfQueuedAndInProgressWorkflowRuns
      repositoryNames:
        - jacobmbanghart/wordpress-saas-portal
---
# Runner for simic-systems-home
apiVersion: actions.summerwind.dev/v1alpha1
kind: RunnerDeployment
metadata:
  name: simic-systems-home-runner
  namespace: actions-runner-system
spec:
  replicas: 1
  template:
    spec:
      repository: jacobmbanghart/simic-systems-home
      labels:
        - self-hosted
        - linux
      # No Docker needed — npm ci + astro check only
      dockerEnabled: false
      resources:
        limits:
          cpu: "2"
          memory: 2Gi
        requests:
          cpu: 500m
          memory: 512Mi
      ephemeral: true
---
# HorizontalRunnerAutoscaler for simic-systems-home
# Lightweight CI — scales 0→2, idles to 0 when no PRs
apiVersion: actions.summerwind.dev/v1alpha1
kind: HorizontalRunnerAutoscaler
metadata:
  name: simic-systems-home-runner-autoscaler
  namespace: actions-runner-system
spec:
  scaleTargetRef:
    name: simic-systems-home-runner
  minReplicas: 0
  maxReplicas: 2
  metrics:
    - type: TotalNumberOfQueuedAndInProgressWorkflowRuns
      repositoryNames:
        - jacobmbanghart/simic-systems-home
