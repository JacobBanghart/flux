apiVersion: v1
kind: Namespace
metadata:
  name: immich
---
apiVersion: source.toolkit.fluxcd.io/v1beta1
kind: HelmRepository
metadata:
  name: immich
  namespace: immich
spec:
  interval: 30m
  url: https://immich-app.github.io/immich-charts
---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: immich
  namespace: immich
spec:
  interval: 30m
  chart:
    spec:
      chart: immich
      version: 0.9.0
      sourceRef:
        kind: HelmRepository
        name: immich
      interval: 30m
  values:
    immich:
      metrics:
        enabled: true
      persistence:
        library:
          existingClaim: immich
      configuration:
        trash:
          enabled: true
          days: 30
    redis:
      enabled: true
    postgresql:
      enabled: true
    useDeprecatedPostgresChart: true
  targetNamespace: immich
