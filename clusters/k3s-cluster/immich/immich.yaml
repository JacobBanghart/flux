apiVersion: v1
kind: Namespace
metadata:
  name: immich
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: immichpv
  namespace: immich
spec:
  capacity:
    storage: 200Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  nfs:
    server: truenas.home
    path: /mnt/BasicPool/kubernetes/immich
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: immichpvc
  namespace: immich
spec:
  resources:
    requests:
      storage: 200Gi
  accessModes:
    - ReadWriteMany
  storageClassName: ""
  volumeName: immichpv
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: immich-postgres-pvc
  namespace: immich
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Gi
  storageClassName: nfs-rwx
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: immich
  namespace: immich
spec:
  interval: 5m
  url: https://immich-app.github.io/immich-charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
  namespace: immich
spec:
  interval: 5m
  chart:
    spec:
      chart: immich
      version: 0.10.3
      sourceRef:
        kind: HelmRepository
        name: immich
      interval: 5m
  values:
    controllers:
      main:
        pod:
          annotations:
            prometheus.io/scrape: "true"
            prometheus.io/port: "8081"
            prometheus.io/path: "/metrics"
        containers:
          main:
            image:
              tag: v2.3.1
            env:
              # PostgreSQL service name
              DB_HOSTNAME: postgresql
              DB_PORT: "5432"
              # Using existing secret: immich-postgres-secret
              DB_USERNAME:
                valueFrom:
                  secretKeyRef:
                    name: immich-postgres-secret
                    key: POSTGRES_USER
              DB_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: immich-postgres-secret
                    key: POSTGRES_PASSWORD
              DB_DATABASE_NAME:
                valueFrom:
                  secretKeyRef:
                    name: immich-postgres-secret
                    key: POSTGRES_DB
              OTEL_SDK_DISABLED: "false"
              OTEL_TRACES_EXPORTER: otlp
              OTEL_EXPORTER_OTLP_ENDPOINT: http://k8s-infra-otel-agent.signoz.svc.cluster.local:4317
              OTEL_EXPORTER_OTLP_PROTOCOL: grpc
              OTEL_SERVICE_NAME: immich
    immich:
      persistence:
        library:
          existingClaim: immichpvc
      configuration:
        trash:
          enabled: true
          days: 30
    # postgresql and redis subcharts removed in 0.10.0+
    # Using external PostgreSQL from postgresql.yaml and valkey (Redis replacement)
    valkey:
      enabled: true # Enable valkey (Redis replacement) for Immich
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: immich-ingress
  namespace: immich
spec:
  rules:
    - host: photos.jacobbanghart.com
      http:
        paths:
          - pathType: Prefix
            path: "/"
            backend:
              service:
                name: immich-server
                port:
                  number: 2283
