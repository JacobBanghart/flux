apiVersion: v1
kind: Namespace
metadata:
  name: immich
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: immichpv
  namespace: immich
spec:
  capacity:
    storage: 200Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  nfs:
    server: truenas.home
    path: /mnt/BasicPool/kubernetes/immich
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: immichpvc
  namespace: immich
spec:
  resources:
    requests:
      storage: 200Gi
  accessModes:
    - ReadWriteMany
  storageClassName: ""
---
apiVersion: source.toolkit.fluxcd.io/v1beta1
kind: HelmRepository
metadata:
  name: immich
  namespace: immich
spec:
  interval: 5m
  url: https://immich-app.github.io/immich-charts
---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: immich
  namespace: immich
spec:
  interval: 5m
  chart:
    spec:
      chart: immich/immich
      version: 0.9.0
      sourceRef:
        kind: HelmRepository
        name: immich
      interval: 5m
  values:
    immich:
      persistence:
        library:
          existingClaim: immichpvc
      configuration:
        trash:
          enabled: true
          days: 30
    postgres:
      enabled: true
    redis:
      enabled: true
    useDeprecatedPostgresChart: true
