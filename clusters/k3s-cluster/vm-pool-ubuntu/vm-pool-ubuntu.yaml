---
apiVersion: v1
kind: Namespace
metadata:
  name: vm-pool-ubuntu

---
# CDI requires a RoleBinding in the SOURCE namespace (cdi) granting the
# requesting ServiceAccount permission to clone DataVolumes across namespaces.
# Without this, VMs get UnauthorizedDataVolumeCreate warnings and never start.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: vm-pool-ubuntu-cdi-clone
  namespace: cdi
subjects:
  - kind: ServiceAccount
    name: default
    namespace: vm-pool-ubuntu
roleRef:
  kind: ClusterRole
  name: edit
  apiGroup: rbac.authorization.k8s.io

---
# VirtualMachinePool — maintains 3 identical Ubuntu 24.04 VMs
# Each VM gets its own PVC cloned from the shared ubuntu-2404 DataVolume in the cdi namespace.
#
# Instance type: u1.medium (1 vCPU, 4Gi RAM) — adjust replicas or instancetype as needed.
# Preference:    ubuntu — sets virtio drivers, cloud-init disk bus, correct firmware.
#
# Cloud-init injects:
#   - A default user 'ubuntu' with SSH password auth disabled (add your SSH pubkey below)
#   - qemu-guest-agent for VM console + lifecycle hooks in kubevirt-manager
#
# To scale:  kubectl scale vmpool ubuntu-pool -n vm-pool-ubuntu --replicas=5
# To access: virtctl ssh ubuntu@ubuntu-pool-<index> -n vm-pool-ubuntu
#            virtctl console ubuntu-pool-<index> -n vm-pool-ubuntu
apiVersion: pool.kubevirt.io/v1alpha1
kind: VirtualMachinePool
metadata:
  name: ubuntu-pool
  namespace: vm-pool-ubuntu
  labels:
    kubevirt-manager.io/managed: "true"
spec:
  replicas: 3
  selector:
    matchLabels:
      kubevirt.io/vmpool: ubuntu-pool

  virtualMachineTemplate:
    metadata:
      labels:
        kubevirt.io/vmpool: ubuntu-pool
        kubevirt-manager.io/managed: "true"

    spec:
      # Use the community instance type + preference instead of inlining CPU/memory
      instancetype:
        kind: VirtualMachineClusterInstancetype
        name: u1.medium
      preference:
        kind: VirtualMachineClusterPreference
        name: ubuntu

      running: true

      template:
        metadata:
          labels:
            kubevirt.io/vmpool: ubuntu-pool

        spec:
          domain:
            devices:
              disks:
                - name: rootdisk
                  disk:
                    bus: virtio
                - name: cloudinitdisk
                  disk:
                    bus: virtio
              interfaces:
                - name: default
                  masquerade: {}
              rng: {}  # Entropy source — required for cloud-init + SSH key generation

          networks:
            - name: default
              pod: {}

          volumes:
            - name: rootdisk
              dataVolume:
                name: rootdisk  # Pool appends -<index> automatically per VM

            - name: cloudinitdisk
              cloudInitNoCloud:
                userData: |
                  #cloud-config
                  hostname: ubuntu-pool
                  package_update: true
                  packages:
                    - qemu-guest-agent
                  runcmd:
                    - systemctl enable --now qemu-guest-agent
                  users:
                    - name: ubuntu
                      groups: sudo
                      shell: /bin/bash
                      sudo: ALL=(ALL) NOPASSWD:ALL
                      # Add your SSH public key here:
                      # ssh_authorized_keys:
                      #   - ssh-ed25519 AAAA... your-key

      # Each VM in the pool gets its own PVC cloned from the shared ubuntu-2404 image
      dataVolumeTemplates:
        - metadata:
            name: rootdisk
          spec:
            pvc:
              accessModes:
                - ReadWriteMany
              storageClassName: nfs-rwx
              resources:
                requests:
                  storage: 20Gi
            source:
              pvc:
                namespace: cdi
                name: ubuntu-2404
