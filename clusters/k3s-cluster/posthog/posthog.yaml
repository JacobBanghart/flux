              valueFrom:
                secretKeyRef:
                  name: posthog-secret
                  key: POSTHOG_ENCRYPTION_SALT
          ports:
            - containerPort: 6738
        - name: plugins-heartbeat
          image: redis:7.2-alpine
          command: [sh, -c]
          args:
            - |
              while true; do
                ts="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
                redis-cli -h redis7 SET "@posthog-plugin-server/ping" "$ts" EX 60 >/dev/null
                sleep 10
              done
