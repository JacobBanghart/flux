# ── Migrate Job ───────────────────────────────────────────────────────────────
apiVersion: batch/v1
kind: Job
metadata:
  name: posthog-migrate
  namespace: posthog
  annotations:
    # Re-run by deleting the job: kubectl delete job posthog-migrate -n posthog
spec:
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-db
          image: postgres:15-alpine
          command: [sh, -c, until pg_isready -h db -U posthog; do sleep 2; done]
        - name: wait-for-clickhouse
          image: curlimages/curl@sha256:c03110c736db81bbe1be0296f1f1608c81b954b01626bdfb0a8f84e5bd00ff3c
          command: [sh, -c, "until curl -sf http://clickhouse:8123/ping; do sleep 5; done"]
        - name: wait-for-kafka
          image: busybox:1.36
          command: [sh, -c, "until nc -z kafka 9092; do echo waiting for kafka; sleep 5; done"]
      containers:
        - name: migrate
          image: posthog/posthog-foss@sha256:225e45c1c586c63532184a5eb9f4ba70cd5d3d60977579d46bcbe7f6021e699d
          command: [sh, -c]
          args:
            - python manage.py migrate && python manage.py migrate_clickhouse && python manage.py run_async_migrations
          envFrom:
            - configMapRef:
                name: posthog-env
            - secretRef:
                name: posthog-postgres-secret
            - secretRef:
                name: posthog-objectstorage-secret
          env:
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: posthog-secret
                  key: POSTHOG_SECRET_KEY
            - name: ENCRYPTION_SALT_KEYS
              valueFrom:
                secretKeyRef:
                  name: posthog-secret
                  key: POSTHOG_ENCRYPTION_SALT
---
# ── Shared env ConfigMap ──────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: posthog-env
  namespace: posthog
data:
  PGHOST: db
  PGUSER: posthog
  CLICKHOUSE_HOST: clickhouse
  CLICKHOUSE_DATABASE: posthog
  CLICKHOUSE_SECURE: "false"
  CLICKHOUSE_VERIFY: "false"
  KAFKA_HOSTS: kafka:9092
  REDIS_URL: redis://redis7:6379/
  SITE_URL: https://posthog.backtosafety.app
  DEPLOYMENT: hobby
  OBJECT_STORAGE_ENABLED: "true"
  OBJECT_STORAGE_ENDPOINT: http://objectstorage:19000
  OBJECT_STORAGE_PUBLIC_ENDPOINT: https://posthog.backtosafety.app
  SESSION_RECORDING_V2_S3_ENDPOINT: http://seaweedfs:8333
  SESSION_RECORDING_V2_S3_ACCESS_KEY_ID: any
  SESSION_RECORDING_V2_S3_SECRET_ACCESS_KEY: any
  RECORDING_API_URL: http://recording-api:6738
  CDP_REDIS_HOST: redis7
  CDP_REDIS_PORT: "6379"
  COOKIELESS_REDIS_HOST: redis7
  COOKIELESS_REDIS_PORT: "6379"
  TEMPORAL_HOST: temporal:7233
  OTEL_SDK_DISABLED: "true"
  POSTHOG_SKIP_MIGRATION_CHECKS: "1"
  SKIP_SERVICE_VERSION_REQUIREMENTS: "1"
