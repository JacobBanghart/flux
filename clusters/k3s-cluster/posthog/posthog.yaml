# ── PostgreSQL ────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: posthog
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: posthog-postgres
  template:
    metadata:
      labels:
        app: posthog-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15.12-alpine
          env:
            - name: POSTGRES_USER
              value: posthog
            - name: POSTGRES_DB
              value: posthog
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: posthog-postgres-secret
                  key: POSTGRES_PASSWORD
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
          readinessProbe:
            exec:
              command: [pg_isready, -U, posthog]
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: posthog-postgres-data
        - name: init-scripts
          configMap:
            name: postgres-init-scripts
            defaultMode: 0755
---
apiVersion: v1
kind: Service
metadata:
  name: db
  namespace: posthog
spec:
  selector:
    app: posthog-postgres
  ports:
    - port: 5432
---
# ── Auxiliary DB bootstrap ────────────────────────────────────────────────────
# The stock postgres initdb.d scripts only run on a pristine data directory.
# This job makes the extra PostHog databases idempotent so a restart/recreate
# does not leave the stack half-initialized.
apiVersion: batch/v1
kind: Job
metadata:
  name: posthog-db-bootstrap
  namespace: posthog
spec:
  backoffLimit: 6
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: bootstrap
          image: postgres:15-alpine
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: posthog-postgres-secret
                  key: PGPASSWORD
          command: [sh, -c]
          args:
            - |
              set -e
              until pg_isready -h db -U posthog; do sleep 2; done

              ensure_db() {
                db_name="$1"
                if ! psql -h db -U posthog -d postgres -tc "SELECT 1 FROM pg_database WHERE datname='${db_name}'" | grep -q 1; then
                  psql -h db -U posthog -d postgres -c "CREATE DATABASE ${db_name};"
                fi
              }

              ensure_db cyclotron
              ensure_db posthog_persons
              ensure_db behavioral_cohorts
---
# ── Redis ─────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: posthog
spec:
  serviceName: redis7
  replicas: 1
  selector:
    matchLabels:
      app: posthog-redis
  template:
    metadata:
      labels:
        app: posthog-redis
    spec:
      containers:
        - name: redis
          image: redis:7.2-alpine
          command: [redis-server, --maxmemory-policy, allkeys-lru, --maxmemory, 200mb]
          ports:
            - containerPort: 6379
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            exec:
              command: [redis-cli, ping]
            initialDelaySeconds: 5
            periodSeconds: 3
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: posthog-redis-data
---
apiVersion: v1
kind: Service
metadata:
  name: redis7
  namespace: posthog
spec:
  selector:
    app: posthog-redis
  ports:
    - port: 6379
---
# ── Zookeeper (for ClickHouse) ────────────────────────────────────────────────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: zookeeper
  namespace: posthog
spec:
  serviceName: zookeeper
  replicas: 1
  selector:
    matchLabels:
      app: posthog-zookeeper
  template:
    metadata:
      labels:
        app: posthog-zookeeper
    spec:
      containers:
        - name: zookeeper
          image: zookeeper:3.7.0
          ports:
            - containerPort: 2181
          volumeMounts:
            - name: data
              mountPath: /data
          env:
            - name: ZOO_MY_ID
              value: "1"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: posthog-zookeeper-data
---
apiVersion: v1
kind: Service
metadata:
  name: zookeeper
  namespace: posthog
spec:
  selector:
    app: posthog-zookeeper
  ports:
    - port: 2181
---
# ── ClickHouse ────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: clickhouse
  namespace: posthog
spec:
  serviceName: clickhouse
  replicas: 1
  selector:
    matchLabels:
      app: posthog-clickhouse
  template:
    metadata:
      labels:
        app: posthog-clickhouse
    spec:
      containers:
        - name: clickhouse
          image: clickhouse/clickhouse-server:22.8
          env:
            - name: CLICKHOUSE_SKIP_USER_SETUP
              value: "1"
            - name: KAFKA_HOSTS
              value: "kafka:9092"
          ports:
            - containerPort: 8123
            - containerPort: 9000
            - containerPort: 9009
          volumeMounts:
            - name: data
              mountPath: /var/lib/clickhouse
            - name: config
              mountPath: /etc/clickhouse-server/config.xml
              subPath: config.xml
            - name: config
              mountPath: /etc/clickhouse-server/users.xml
              subPath: users.xml
          readinessProbe:
            httpGet:
              path: /ping
              port: 8123
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: posthog-clickhouse-data
        - name: config
          configMap:
            name: clickhouse-config
---
apiVersion: v1
kind: Service
metadata:
  name: clickhouse
  namespace: posthog
spec:
  clusterIP: None
  selector:
    app: posthog-clickhouse
  ports:
    - name: http
      port: 8123
    - name: native
      port: 9000
    - name: interserver
      port: 9009
---
# ── Apache Kafka (KRaft mode) ─────────────────────────────────────────────────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
  namespace: posthog
spec:
  serviceName: kafka
  replicas: 1
  selector:
    matchLabels:
      app: posthog-kafka
  template:
    metadata:
      labels:
        app: posthog-kafka
    spec:
      containers:
        - name: kafka
          image: apache/kafka:3.7.0
          env:
            - name: KAFKA_NODE_ID
              value: "1"
            - name: KAFKA_PROCESS_ROLES
              value: broker,controller
            - name: KAFKA_LISTENERS
              value: PLAINTEXT://0.0.0.0:9092,CONTROLLER://localhost:9093
            - name: KAFKA_ADVERTISED_LISTENERS
              value: PLAINTEXT://kafka:9092
            - name: KAFKA_CONTROLLER_QUORUM_VOTERS
              value: 1@localhost:9093
            - name: KAFKA_CONTROLLER_LISTENER_NAMES
              value: CONTROLLER
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
            - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
              value: "true"
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
              value: "1"
            - name: KAFKA_LOG_DIRS
              value: /var/lib/kafka/data
            - name: CLUSTER_ID
              value: MkU3OEVBNTcwNTJENDM2Qk
          ports:
            - containerPort: 9092
            - containerPort: 9093
          volumeMounts:
            - name: data
              mountPath: /var/lib/kafka/data
          readinessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 30
            periodSeconds: 5
            failureThreshold: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: posthog-kafka-data
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: posthog
spec:
  selector:
    app: posthog-kafka
  ports:
    - name: kafka
      port: 9092
    - name: controller
      port: 9093
    - name: admin
      port: 9644
---
# ── MinIO (object storage) ────────────────────────────────────────────────────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: objectstorage
  namespace: posthog
spec:
  serviceName: objectstorage
  replicas: 1
  selector:
    matchLabels:
      app: posthog-objectstorage
  template:
    metadata:
      labels:
        app: posthog-objectstorage
    spec:
      containers:
        - name: minio
          image: minio/minio:RELEASE.2025-04-22T22-12-26Z
          command: [sh, -c]
          args:
            - mkdir -p /data/posthog /data/ducklake-dev /data/ai-blobs && minio server --address ":19000" --console-address ":19001" /data
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: posthog-objectstorage-secret
                  key: MINIO_ROOT_USER
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: posthog-objectstorage-secret
                  key: MINIO_ROOT_PASSWORD
          ports:
            - containerPort: 19000
            - containerPort: 19001
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: posthog-objectstorage-data
---
apiVersion: v1
kind: Service
metadata:
  name: objectstorage
  namespace: posthog
spec:
  selector:
    app: posthog-objectstorage
  ports:
    - name: api
      port: 19000
    - name: console
      port: 19001
---
# ── SeaweedFS (session recording blobs) ───────────────────────────────────────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: seaweedfs
  namespace: posthog
spec:
  serviceName: seaweedfs
  replicas: 1
  selector:
    matchLabels:
      app: posthog-seaweedfs
  template:
    metadata:
      labels:
        app: posthog-seaweedfs
    spec:
      containers:
        - name: seaweedfs
          image: chrislusf/seaweedfs:4.03
          command: [/bin/sh, -c]
          args:
            - |
              /usr/bin/weed server -s3 -s3.port=8333 -dir=/data &
              WEED_PID=$!
              sleep 15
              echo "s3.bucket.create -name posthog" | /usr/bin/weed shell -master=localhost:9333 2>&1 || true
              wait $WEED_PID
          ports:
            - containerPort: 9333
            - containerPort: 8333
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: posthog-seaweedfs-data
---
apiVersion: v1
kind: Service
metadata:
  name: seaweedfs
  namespace: posthog
spec:
  selector:
    app: posthog-seaweedfs
  ports:
    - name: master
      port: 9333
    - name: s3
      port: 8333
---
# ── Elasticsearch (for Temporal) ──────────────────────────────────────────────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: elasticsearch
  namespace: posthog
spec:
  serviceName: elasticsearch
  replicas: 1
  selector:
    matchLabels:
      app: posthog-elasticsearch
  template:
    metadata:
      labels:
        app: posthog-elasticsearch
    spec:
      containers:
        - name: elasticsearch
          image: elasticsearch:7.17.28
          env:
            - name: cluster.routing.allocation.disk.threshold_enabled
              value: "true"
            - name: cluster.routing.allocation.disk.watermark.low
              value: 512mb
            - name: cluster.routing.allocation.disk.watermark.high
              value: 256mb
            - name: cluster.routing.allocation.disk.watermark.flood_stage
              value: 128mb
            - name: discovery.type
              value: single-node
            - name: ES_JAVA_OPTS
              value: "-Xms256m -Xmx256m"
            - name: xpack.security.enabled
              value: "false"
          ports:
            - containerPort: 9200
          readinessProbe:
            httpGet:
              path: /_cluster/health
              port: 9200
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 30
---
apiVersion: v1
kind: Service
metadata:
  name: elasticsearch
  namespace: posthog
spec:
  selector:
    app: posthog-elasticsearch
  ports:
    - port: 9200
---
# ── Temporal ──────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal
  namespace: posthog
spec:
  replicas: 1
  selector:
    matchLabels:
      app: posthog-temporal
  template:
    metadata:
      labels:
        app: posthog-temporal
    spec:
      initContainers:
        - name: wait-for-db
          image: postgres:15-alpine
          command: [sh, -c, until pg_isready -h db -U posthog; do sleep 2; done]
        - name: wait-for-es
          image: curlimages/curl@sha256:c03110c736db81bbe1be0296f1f1608c81b954b01626bdfb0a8f84e5bd00ff3c
          command: [sh, -c, "until curl -sf http://elasticsearch:9200/_cluster/health; do sleep 5; done"]
      containers:
        - name: temporal
          image: temporalio/auto-setup:1.26.2
          env:
            - name: DB
              value: postgres12
            - name: DB_PORT
              value: "5432"
            - name: POSTGRES_USER
              value: posthog
            - name: POSTGRES_PWD
              valueFrom:
                secretKeyRef:
                  name: posthog-postgres-secret
                  key: POSTGRES_PWD
            - name: POSTGRES_SEEDS
              value: db
            - name: DYNAMIC_CONFIG_FILE_PATH
              value: config/dynamicconfig/docker.yaml
            - name: ENABLE_ES
              value: "true"
            - name: ES_SEEDS
              value: elasticsearch
            - name: ES_VERSION
              value: v7
          ports:
            - containerPort: 7233
          readinessProbe:
            tcpSocket:
              port: 7233
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 30
---
