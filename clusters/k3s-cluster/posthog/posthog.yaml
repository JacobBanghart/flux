apiVersion: v1
kind: Namespace
metadata:
  name: posthog
---
# ── Secrets ──────────────────────────────────────────────────────────────────
# Secret created manually:
#   kubectl create secret generic posthog-secret -n posthog \
#     --from-literal=POSTHOG_SECRET_KEY=<50-char-random> \
#     --from-literal=POSTHOG_ENCRYPTION_SALT=<32-char-random>
#
# ── ConfigMaps ────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: clickhouse-config
  namespace: posthog
data:
  config.xml: |
    <?xml version="1.0"?>
    <clickhouse>
        <logger>
            <level>warning</level>
            <log>/var/log/clickhouse-server/clickhouse-server.log</log>
            <errorlog>/var/log/clickhouse-server/clickhouse-server.err.log</errorlog>
            <size>1000M</size>
            <count>10</count>
        </logger>
        <http_port>8123</http_port>
        <tcp_port>9000</tcp_port>
        <interserver_http_port>9009</interserver_http_port>
        <max_connections>4096</max_connections>
        <keep_alive_timeout>3</keep_alive_timeout>
        <max_concurrent_queries>200</max_concurrent_queries>
        <max_server_memory_usage>0</max_server_memory_usage>
        <uncompressed_cache_size>8589934592</uncompressed_cache_size>
        <mark_cache_size>5368709120</mark_cache_size>
        <path>/var/lib/clickhouse/</path>
        <tmp_path>/var/lib/clickhouse/tmp/</tmp_path>
        <user_files_path>/var/lib/clickhouse/user_files/</user_files_path>
        <user_directories>
            <users_xml>
                <path>/etc/clickhouse-server/users.xml</path>
            </users_xml>
            <local_directory>
                <path>/var/lib/clickhouse/access/</path>
            </local_directory>
        </user_directories>
        <default_profile>default</default_profile>
        <default_database>default</default_database>
        <timezone>UTC</timezone>
        <mlock_executable>false</mlock_executable>
        <remote_servers>
            <posthog>
                <shard>
                    <replica>
                        <host>clickhouse</host>
                        <port>9000</port>
                    </replica>
                </shard>
            </posthog>
        </remote_servers>
        <zookeeper>
            <node index="1">
                <host>zookeeper</host>
                <port>2181</port>
            </node>
        </zookeeper>
        <macros>
            <shard>1</shard>
            <replica>1</replica>
            <cluster>posthog</cluster>
        </macros>
        <distributed_ddl>
            <path>/clickhouse/task_queue/ddl</path>
        </distributed_ddl>
        <builtin_dictionaries_reload_interval>3600</builtin_dictionaries_reload_interval>
        <max_session_timeout>3600</max_session_timeout>
        <default_session_timeout>60</default_session_timeout>
        <query_log>
            <database>system</database>
            <table>query_log</table>
            <flush_interval_milliseconds>7500</flush_interval_milliseconds>
        </query_log>
        <query_thread_log>
            <database>system</database>
            <table>query_thread_log</table>
            <flush_interval_milliseconds>7500</flush_interval_milliseconds>
        </query_thread_log>
        <metric_log>
            <database>system</database>
            <table>metric_log</table>
            <flush_interval_milliseconds>7500</flush_interval_milliseconds>
            <collect_interval_milliseconds>1000</collect_interval_milliseconds>
        </metric_log>
        <asynchronous_metric_log>
            <database>system</database>
            <table>asynchronous_metric_log</table>
            <flush_interval_milliseconds>60000</flush_interval_milliseconds>
        </asynchronous_metric_log>
        <crash_log>
            <database>system</database>
            <table>crash_log</table>
            <partition_by/>
            <flush_interval_milliseconds>1000</flush_interval_milliseconds>
        </crash_log>
        <dictionaries_config>*_dictionary.xml</dictionaries_config>
        <compression>
            <case>
                <min_part_size>10000000000</min_part_size>
                <min_part_size_ratio>0.01</min_part_size_ratio>
                <method>zstd</method>
            </case>
        </compression>
        <format_schema_path>/var/lib/clickhouse/format_schemas/</format_schema_path>
    </clickhouse>
  users.xml: |
    <?xml version="1.0"?>
    <clickhouse>
        <profiles>
            <default>
                <max_memory_usage>10000000000</max_memory_usage>
                <use_uncompressed_cache>0</use_uncompressed_cache>
                <load_balancing>random</load_balancing>
            </default>
            <readonly>
                <readonly>1</readonly>
            </readonly>
        </profiles>
        <users>
            <default>
                <password></password>
                <networks>
                    <ip>::/0</ip>
                </networks>
                <profile>default</profile>
                <quota>default</quota>
            </default>
        </users>
        <quotas>
            <default>
                <interval>
                    <duration>3600</duration>
                    <queries>0</queries>
                    <errors>0</errors>
                    <result_rows>0</result_rows>
                    <read_rows>0</read_rows>
                    <execution_time>0</execution_time>
                </interval>
            </default>
        </quotas>
    </clickhouse>
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-scripts
  namespace: posthog
data:
  01-create-cyclotron-db.sh: |
    #!/bin/bash
    set -e
    psql -U "$POSTGRES_USER" -tc "SELECT 1 FROM pg_database WHERE datname='cyclotron'" | grep -q 1 || \
      psql -U "$POSTGRES_USER" -c "CREATE DATABASE cyclotron; GRANT ALL PRIVILEGES ON DATABASE cyclotron TO $POSTGRES_USER;"
  02-create-persons-db.sh: |
    #!/bin/bash
    set -e
    psql -U "$POSTGRES_USER" -tc "SELECT 1 FROM pg_database WHERE datname='posthog_persons'" | grep -q 1 || \
      psql -U "$POSTGRES_USER" -c "CREATE DATABASE posthog_persons; GRANT ALL PRIVILEGES ON DATABASE posthog_persons TO $POSTGRES_USER;"
  03-create-behavioral-cohorts-db.sh: |
    #!/bin/bash
    set -e
    psql -U "$POSTGRES_USER" -tc "SELECT 1 FROM pg_database WHERE datname='behavioral_cohorts'" | grep -q 1 || \
      psql -U "$POSTGRES_USER" -c "CREATE DATABASE behavioral_cohorts; GRANT ALL PRIVILEGES ON DATABASE behavioral_cohorts TO $POSTGRES_USER;"
---
# ── PersistentVolumeClaims ────────────────────────────────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: posthog
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 20Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-data
  namespace: posthog
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: clickhouse-data
  namespace: posthog
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 50Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: zookeeper-data
  namespace: posthog
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kafka-data
  namespace: posthog
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 20Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: objectstorage-data
  namespace: posthog
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 20Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: seaweedfs-data
  namespace: posthog
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 20Gi
---
# ── PostgreSQL ────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: posthog
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: posthog-postgres
  template:
    metadata:
      labels:
        app: posthog-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15.12-alpine
          env:
            - name: POSTGRES_USER
              value: posthog
            - name: POSTGRES_DB
              value: posthog
            - name: POSTGRES_PASSWORD
              value: posthog
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
          readinessProbe:
            exec:
              command: [pg_isready, -U, posthog]
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgres-data
        - name: init-scripts
          configMap:
            name: postgres-init-scripts
            defaultMode: 0755
---
apiVersion: v1
kind: Service
metadata:
  name: db
  namespace: posthog
spec:
  selector:
    app: posthog-postgres
  ports:
    - port: 5432
---
# ── Redis ─────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: posthog
spec:
  serviceName: redis7
  replicas: 1
  selector:
    matchLabels:
      app: posthog-redis
  template:
    metadata:
      labels:
        app: posthog-redis
    spec:
      containers:
        - name: redis
          image: redis:7.2-alpine
          command: [redis-server, --maxmemory-policy, allkeys-lru, --maxmemory, 200mb]
          ports:
            - containerPort: 6379
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            exec:
              command: [redis-cli, ping]
            initialDelaySeconds: 5
            periodSeconds: 3
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: redis-data
---
apiVersion: v1
kind: Service
metadata:
  name: redis7
  namespace: posthog
spec:
  selector:
    app: posthog-redis
  ports:
    - port: 6379
---
# ── Zookeeper (for ClickHouse) ────────────────────────────────────────────────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: zookeeper
  namespace: posthog
spec:
  serviceName: zookeeper
  replicas: 1
  selector:
    matchLabels:
      app: posthog-zookeeper
  template:
    metadata:
      labels:
        app: posthog-zookeeper
    spec:
      containers:
        - name: zookeeper
          image: zookeeper:3.7.0
          ports:
            - containerPort: 2181
          volumeMounts:
            - name: data
              mountPath: /data
          env:
            - name: ZOO_MY_ID
              value: "1"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: zookeeper-data
---
apiVersion: v1
kind: Service
metadata:
  name: zookeeper
  namespace: posthog
spec:
  selector:
    app: posthog-zookeeper
  ports:
    - port: 2181
---
# ── ClickHouse ────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: clickhouse
  namespace: posthog
spec:
  serviceName: clickhouse
  replicas: 1
  selector:
    matchLabels:
      app: posthog-clickhouse
  template:
    metadata:
      labels:
        app: posthog-clickhouse
    spec:
      containers:
        - name: clickhouse
          image: clickhouse/clickhouse-server:26.3.9.8
          env:
            - name: CLICKHOUSE_SKIP_USER_SETUP
              value: "1"
            - name: KAFKA_HOSTS
              value: "kafka:9092"
          ports:
            - containerPort: 8123
            - containerPort: 9000
            - containerPort: 9009
          volumeMounts:
            - name: data
              mountPath: /var/lib/clickhouse
            - name: config
              mountPath: /etc/clickhouse-server/config.xml
              subPath: config.xml
            - name: config
              mountPath: /etc/clickhouse-server/users.xml
              subPath: users.xml
          readinessProbe:
            httpGet:
              path: /ping
              port: 8123
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: clickhouse-data
        - name: config
          configMap:
            name: clickhouse-config
---
apiVersion: v1
kind: Service
metadata:
  name: clickhouse
  namespace: posthog
spec:
  selector:
    app: posthog-clickhouse
  ports:
    - name: http
      port: 8123
    - name: native
      port: 9000
    - name: interserver
      port: 9009
---
# ── Redpanda (Kafka-compatible) ────────────────────────────────────────────────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
  namespace: posthog
spec:
  serviceName: kafka
  replicas: 1
  selector:
    matchLabels:
      app: posthog-kafka
  template:
    metadata:
      labels:
        app: posthog-kafka
    spec:
      containers:
        - name: redpanda
          image: docker.redpanda.com/redpandadata/redpanda:v23.3.14
          command:
            - redpanda
            - start
            - --kafka-addr
            - internal://0.0.0.0:9092,external://0.0.0.0:19092
            - --advertise-kafka-addr
            - internal://kafka:9092,external://localhost:19092
            - --pandaproxy-addr
            - internal://0.0.0.0:8082,external://0.0.0.0:18082
            - --advertise-pandaproxy-addr
            - internal://kafka:8082,external://localhost:18082
            - --schema-registry-addr
            - internal://0.0.0.0:8081,external://0.0.0.0:18081
            - --rpc-addr
            - kafka:33145
            - --advertise-rpc-addr
            - kafka:33145
            - --mode
            - dev-container
            - --smp
            - "2"
            - --memory
            - 3G
            - --reserve-memory
            - 500M
            - --overprovisioned
            - --set
            - redpanda.empty_seed_starts_cluster=true
            - --set
            - redpanda.auto_create_topics_enabled=true
          env:
            - name: ALLOW_PLAINTEXT_LISTENER
              value: "true"
          ports:
            - containerPort: 9092
            - containerPort: 19092
            - containerPort: 8081
            - containerPort: 8082
            - containerPort: 9644
          volumeMounts:
            - name: data
              mountPath: /var/lib/redpanda/data
          readinessProbe:
            httpGet:
              path: /v1/status/ready
              port: 9644
            initialDelaySeconds: 30
            periodSeconds: 5
            failureThreshold: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: kafka-data
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: posthog
spec:
  selector:
    app: posthog-kafka
  ports:
    - name: kafka
      port: 9092
    - name: schema-registry
      port: 8081
    - name: pandaproxy
      port: 8082
    - name: admin
      port: 9644
---
# ── MinIO (object storage) ────────────────────────────────────────────────────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: objectstorage
  namespace: posthog
spec:
  serviceName: objectstorage
  replicas: 1
  selector:
    matchLabels:
      app: posthog-objectstorage
  template:
    metadata:
      labels:
        app: posthog-objectstorage
    spec:
      containers:
        - name: minio
          image: minio/minio:RELEASE.2025-04-22T22-12-26Z
          command: [sh, -c]
          args:
            - mkdir -p /data/posthog /data/ducklake-dev /data/ai-blobs && minio server --address ":19000" --console-address ":19001" /data
          env:
            - name: MINIO_ROOT_USER
              value: object_storage_root_user
            - name: MINIO_ROOT_PASSWORD
              value: object_storage_root_password
          ports:
            - containerPort: 19000
            - containerPort: 19001
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: objectstorage-data
---
apiVersion: v1
kind: Service
metadata:
  name: objectstorage
  namespace: posthog
spec:
  selector:
    app: posthog-objectstorage
  ports:
    - name: api
      port: 19000
    - name: console
      port: 19001
---
# ── SeaweedFS (session recording blobs) ───────────────────────────────────────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: seaweedfs
  namespace: posthog
spec:
  serviceName: seaweedfs
  replicas: 1
  selector:
    matchLabels:
      app: posthog-seaweedfs
  template:
    metadata:
      labels:
        app: posthog-seaweedfs
    spec:
      containers:
        - name: seaweedfs
          image: chrislusf/seaweedfs:4.03
          command: [/bin/sh, -c]
          args:
            - |
              /usr/bin/weed server -s3 -s3.port=8333 -dir=/data &
              WEED_PID=$!
              sleep 15
              echo "s3.bucket.create -name posthog" | /usr/bin/weed shell -master=localhost:9333 2>&1 || true
              wait $WEED_PID
          ports:
            - containerPort: 9333
            - containerPort: 8333
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: seaweedfs-data
---
apiVersion: v1
kind: Service
metadata:
  name: seaweedfs
  namespace: posthog
spec:
  selector:
    app: posthog-seaweedfs
  ports:
    - name: master
      port: 9333
    - name: s3
      port: 8333
---
# ── Elasticsearch (for Temporal) ──────────────────────────────────────────────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: elasticsearch
  namespace: posthog
spec:
  serviceName: elasticsearch
  replicas: 1
  selector:
    matchLabels:
      app: posthog-elasticsearch
  template:
    metadata:
      labels:
        app: posthog-elasticsearch
    spec:
      containers:
        - name: elasticsearch
          image: elasticsearch:7.17.28
          env:
            - name: cluster.routing.allocation.disk.threshold_enabled
              value: "true"
            - name: cluster.routing.allocation.disk.watermark.low
              value: 512mb
            - name: cluster.routing.allocation.disk.watermark.high
              value: 256mb
            - name: cluster.routing.allocation.disk.watermark.flood_stage
              value: 128mb
            - name: discovery.type
              value: single-node
            - name: ES_JAVA_OPTS
              value: "-Xms256m -Xmx256m"
            - name: xpack.security.enabled
              value: "false"
          ports:
            - containerPort: 9200
          readinessProbe:
            httpGet:
              path: /_cluster/health
              port: 9200
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 30
---
apiVersion: v1
kind: Service
metadata:
  name: elasticsearch
  namespace: posthog
spec:
  selector:
    app: posthog-elasticsearch
  ports:
    - port: 9200
---
# ── Temporal ──────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal
  namespace: posthog
spec:
  replicas: 1
  selector:
    matchLabels:
      app: posthog-temporal
  template:
    metadata:
      labels:
        app: posthog-temporal
    spec:
      initContainers:
        - name: wait-for-db
          image: postgres:15-alpine
          command: [sh, -c, until pg_isready -h db -U posthog; do sleep 2; done]
        - name: wait-for-es
          image: curlimages/curl:latest
          command: [sh, -c, "until curl -sf http://elasticsearch:9200/_cluster/health; do sleep 5; done"]
      containers:
        - name: temporal
          image: temporalio/auto-setup:1.26.2
          env:
            - name: DB
              value: postgres12
            - name: DB_PORT
              value: "5432"
            - name: POSTGRES_USER
              value: posthog
            - name: POSTGRES_PWD
              value: posthog
            - name: POSTGRES_SEEDS
              value: db
            - name: DYNAMIC_CONFIG_FILE_PATH
              value: config/dynamicconfig/development-sql.yaml
            - name: ENABLE_ES
              value: "true"
            - name: ES_SEEDS
              value: elasticsearch
            - name: ES_VERSION
              value: v7
          ports:
            - containerPort: 7233
          readinessProbe:
            tcpSocket:
              port: 7233
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 30
---
apiVersion: v1
kind: Service
metadata:
  name: temporal
  namespace: posthog
spec:
  selector:
    app: posthog-temporal
  ports:
    - port: 7233
---
# ── Temporal UI ───────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal-ui
  namespace: posthog
spec:
  replicas: 1
  selector:
    matchLabels:
      app: posthog-temporal-ui
  template:
    metadata:
      labels:
        app: posthog-temporal-ui
    spec:
      containers:
        - name: temporal-ui
          image: temporalio/ui:2.47.2
          env:
            - name: TEMPORAL_ADDRESS
              value: temporal:7233
            - name: TEMPORAL_CORS_ORIGINS
              value: http://localhost:3000
            - name: TEMPORAL_CSRF_COOKIE_INSECURE
              value: "true"
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: temporal-ui
  namespace: posthog
spec:
  selector:
    app: posthog-temporal-ui
  ports:
    - port: 8080
---
# ── Migrate Job ───────────────────────────────────────────────────────────────
apiVersion: batch/v1
kind: Job
metadata:
  name: posthog-migrate
  namespace: posthog
  annotations:
    # Re-run by deleting the job: kubectl delete job posthog-migrate -n posthog
spec:
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-db
          image: postgres:15-alpine
          command: [sh, -c, until pg_isready -h db -U posthog; do sleep 2; done]
        - name: wait-for-clickhouse
          image: curlimages/curl:latest
          command: [sh, -c, "until curl -sf http://clickhouse:8123/ping; do sleep 5; done"]
        - name: wait-for-kafka
          image: curlimages/curl:latest
          command: [sh, -c, "until curl -sf http://kafka:9644/v1/status/ready; do sleep 5; done"]
      containers:
        - name: migrate
          image: posthog/posthog:latest
          command: [sh, -c]
          args:
            - python manage.py migrate && python manage.py migrate_clickhouse && python manage.py run_async_migrations
          envFrom:
            - configMapRef:
                name: posthog-env
          env:
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: posthog-secret
                  key: POSTHOG_SECRET_KEY
            - name: ENCRYPTION_SALT_KEYS
              valueFrom:
                secretKeyRef:
                  name: posthog-secret
                  key: POSTHOG_ENCRYPTION_SALT
---
# ── Shared env ConfigMap ──────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: posthog-env
  namespace: posthog
data:
  DATABASE_URL: postgres://posthog:posthog@db:5432/posthog
  PGHOST: db
  PGUSER: posthog
  PGPASSWORD: posthog
  CLICKHOUSE_HOST: clickhouse
  CLICKHOUSE_DATABASE: posthog
  CLICKHOUSE_SECURE: "false"
  CLICKHOUSE_VERIFY: "false"
  KAFKA_HOSTS: kafka:9092
  REDIS_URL: redis://redis7:6379/
  SITE_URL: https://posthog.backtosafety.app
  DEPLOYMENT: hobby
  OBJECT_STORAGE_ENABLED: "true"
  OBJECT_STORAGE_ENDPOINT: http://objectstorage:19000
  OBJECT_STORAGE_PUBLIC_ENDPOINT: https://posthog.backtosafety.app
  OBJECT_STORAGE_ACCESS_KEY_ID: object_storage_root_user
  OBJECT_STORAGE_SECRET_ACCESS_KEY: object_storage_root_password
  SESSION_RECORDING_V2_S3_ENDPOINT: http://seaweedfs:8333
  SESSION_RECORDING_V2_S3_ACCESS_KEY_ID: any
  SESSION_RECORDING_V2_S3_SECRET_ACCESS_KEY: any
  RECORDING_API_URL: http://recording-api:6738
  CDP_REDIS_HOST: redis7
  CDP_REDIS_PORT: "6379"
  COOKIELESS_REDIS_HOST: redis7
  COOKIELESS_REDIS_PORT: "6379"
  TEMPORAL_HOST: temporal
  OTEL_SDK_DISABLED: "true"
  POSTHOG_SKIP_MIGRATION_CHECKS: "1"
  PERSONS_DATABASE_URL: postgres://posthog:posthog@db:5432/posthog
  BEHAVIORAL_COHORTS_DATABASE_URL: postgres://posthog:posthog@db:5432/posthog
  CYCLOTRON_DATABASE_URL: postgres://posthog:posthog@db:5432/cyclotron
---
# ── Web (Django backend + frontend) ───────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: posthog
spec:
  replicas: 1
  selector:
    matchLabels:
      app: posthog-web
  template:
    metadata:
      labels:
        app: posthog-web
    spec:
      containers:
        - name: web
          image: posthog/posthog:latest
          command: [./bin/start-backend]
          envFrom:
            - configMapRef:
                name: posthog-env
          env:
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: posthog-secret
                  key: POSTHOG_SECRET_KEY
            - name: ENCRYPTION_SALT_KEYS
              valueFrom:
                secretKeyRef:
                  name: posthog-secret
                  key: POSTHOG_ENCRYPTION_SALT
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /_health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 10
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: posthog
spec:
  selector:
    app: posthog-web
  ports:
    - port: 8000
---
# ── Worker (Celery) ───────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: posthog
spec:
  replicas: 1
  selector:
    matchLabels:
      app: posthog-worker
  template:
    metadata:
      labels:
        app: posthog-worker
    spec:
      containers:
        - name: worker
          image: posthog/posthog:latest
          command: [./bin/docker-worker-celery, --with-scheduler]
          envFrom:
            - configMapRef:
                name: posthog-env
          env:
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: posthog-secret
                  key: POSTHOG_SECRET_KEY
            - name: ENCRYPTION_SALT_KEYS
              valueFrom:
                secretKeyRef:
                  name: posthog-secret
                  key: POSTHOG_ENCRYPTION_SALT
---
