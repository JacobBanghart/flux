# ── Rust microservices ────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: capture
  namespace: posthog
spec:
  replicas: 1
  selector:
    matchLabels:
      app: posthog-capture
  template:
    metadata:
      labels:
        app: posthog-capture
    spec:
      containers:
        - name: capture
          image: ghcr.io/posthog/posthog/capture:master
          env:
            - name: ADDRESS
              value: "0.0.0.0:3000"
            - name: KAFKA_TOPIC
              value: events_plugin_ingestion
            - name: KAFKA_HOSTS
              value: kafka:9092
            - name: REDIS_URL
              value: redis://redis7:6379/
            - name: CAPTURE_MODE
              value: events
            - name: RUST_LOG
              value: "info,rdkafka=warn"
          ports:
            - containerPort: 3000
