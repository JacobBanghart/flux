# ── Ingress ───────────────────────────────────────────────────────────────────
# Routes: /s/* → replay-capture:3000, /flags/* → feature-flags:3001,
#         /e /i /batch /capture → capture:3000, everything else → web:8000
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: posthog
  namespace: posthog
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls.certresolver: cloudflare
spec:
  ingressClassName: traefik
  rules:
    - host: posthog.backtosafety.app
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 8000
