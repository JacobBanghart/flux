      storage: 50Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: posthog-zookeeper-data
  namespace: posthog
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: nfs-rwx
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
