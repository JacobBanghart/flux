                  name: posthog-postgres-secret
                  key: PGPASSWORD
          command: [sh, -c, "until psql -h db -U posthog -d cyclotron -c 'SELECT 1' >/dev/null 2>&1; do sleep 5; done"]
      containers:
        - name: cyclotron-janitor
          image: ghcr.io/posthog/posthog/cyclotron-janitor@sha256:71790ce6594d119002db0d4b518d02855b99df154a7a69a363e6b80db8bfbe70
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: posthog-postgres-secret
                  key: CYCLOTRON_DATABASE_URL
            - name: KAFKA_HOSTS
              value: kafka:9092
            - name: KAFKA_TOPIC
              value: clickhouse_app_metrics2
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: livestream
  namespace: posthog
spec:
  replicas: 1
  selector:
    matchLabels:
      app: posthog-livestream
  template:
    metadata:
      labels:
        app: posthog-livestream
    spec:
      initContainers:
        - name: copy-geoip
          image: ghcr.io/posthog/posthog/feature-flags@sha256:2b925bd020e1b4444378bb15d3c8acaea08f5b452d5b1fe39a0dec4e90d4bdc1
          command: ["sh", "-c", "cp /app/share/GeoLite2-City.mmdb /geoip/GeoLite2-City.mmdb"]
          volumeMounts:
            - name: geoip
              mountPath: /geoip
      containers:
        - name: livestream
          image: ghcr.io/posthog/posthog/livestream@sha256:2a6630500816bbc477aaa795e5c3ec8f824e03516c189e85ca9afedddf8ac407
          env:
            - name: KAFKA_HOSTS
              value: kafka:9092
            - name: MMDB_PATH
              value: /geoip/GeoLite2-City.mmdb
          volumeMounts:
            - name: geoip
              mountPath: /geoip
            - name: livestream-config
              mountPath: /configs
          ports:
            - containerPort: 8080
      volumes:
        - name: geoip
          emptyDir: {}
        - name: livestream-config
          configMap:
            name: livestream-config
---
apiVersion: v1
kind: Service
metadata:
  name: livestream
  namespace: posthog
spec:
  selector:
    app: posthog-livestream
  ports:
    - port: 8080
---
# ── Ingress ───────────────────────────────────────────────────────────────────
# Minimal external surface: UI on /, feature flags on /flags, event ingestion on
# /e, /i, /batch, and /capture.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: redirect-ingestion
  namespace: posthog
spec:
  redirectRegex:
    regex: ^https://posthog\.backtosafety\.app/ingestion/?$
    replacement: https://posthog.backtosafety.app/
    permanent: false
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: posthog-ingestion-redirect
  namespace: posthog
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls.certresolver: cloudflare
    traefik.ingress.kubernetes.io/router.middlewares: posthog-redirect-ingestion@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
    - host: posthog.backtosafety.app
      http:
        paths:
          - path: /ingestion
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 8000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: posthog
  namespace: posthog
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls.certresolver: cloudflare
spec:
  ingressClassName: traefik
  rules:
    - host: posthog.backtosafety.app
      http:
        paths:
          - path: /flags
            pathType: Prefix
            backend:
              service:
                name: feature-flags
                port:
                  number: 3001
          - path: /e
            pathType: Prefix
            backend:
              service:
                name: capture
                port:
                  number: 3000
          - path: /i
            pathType: Prefix
            backend:
              service:
                name: capture
                port:
                  number: 3000
          - path: /batch
            pathType: Prefix
            backend:
              service:
                name: capture
                port:
                  number: 3000
          - path: /capture
            pathType: Prefix
            backend:
              service:
                name: capture
                port:
                  number: 3000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 8000
