---
apiVersion: v1
kind: Namespace
metadata:
  name: posthog
---
# PostHog web UI (Caddy reverse proxy on host port 80)
apiVersion: v1
kind: Endpoints
metadata:
  name: posthog-web
  namespace: posthog
subsets:
  - addresses:
      - ip: 10.1.0.34
    ports:
      - name: http
        port: 80
---
apiVersion: v1
kind: Service
metadata:
  name: posthog-web
  namespace: posthog
spec:
  ports:
    - name: http
      port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: posthog-web
  namespace: posthog
spec:
  rules:
    - host: posthog.backtosafety.app
      http:
        paths:
          - pathType: Prefix
            path: "/"
            backend:
              service:
                name: posthog-web
                port:
                  number: 80
---
# Temporal UI (docker-compose exposes host port 8081)
apiVersion: v1
kind: Endpoints
metadata:
  name: posthog-temporal-ui
  namespace: posthog
subsets:
  - addresses:
      - ip: 10.1.0.34
    ports:
      - name: http
        port: 8081
---
apiVersion: v1
kind: Service
metadata:
  name: posthog-temporal-ui
  namespace: posthog
spec:
  ports:
    - name: http
      port: 8081
      targetPort: 8081
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: posthog-temporal-ui
  namespace: posthog
spec:
  rules:
    - host: temporal.backtosafety.app
      http:
        paths:
          - pathType: Prefix
            path: "/"
            backend:
              service:
                name: posthog-temporal-ui
                port:
                  number: 8081
