apiVersion: v1
kind: Namespace
metadata:
  name: image-compressor
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: image-compressor-ui
  namespace: image-compressor
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Image Compressor</title>
      <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
          font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
          background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
          min-height: 100vh;
          color: #fff;
          padding: 2rem;
        }
        .container { max-width: 900px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 2rem; font-size: 2.5rem; }
        .upload-zone {
          border: 3px dashed #4a5568;
          border-radius: 1rem;
          padding: 3rem;
          text-align: center;
          transition: all 0.3s;
          background: rgba(255,255,255,0.05);
          cursor: pointer;
        }
        .upload-zone:hover, .upload-zone.drag-over {
          border-color: #667eea;
          background: rgba(102, 126, 234, 0.1);
        }
        .upload-zone input { display: none; }
        .controls {
          background: rgba(255,255,255,0.1);
          border-radius: 1rem;
          padding: 1.5rem;
          margin: 1.5rem 0;
          display: none;
        }
        .controls.active { display: block; }
        .control-group {
          margin-bottom: 1rem;
        }
        .control-group label {
          display: block;
          margin-bottom: 0.5rem;
          font-weight: 500;
        }
        .control-group input[type="range"] {
          width: 100%;
          height: 8px;
          border-radius: 4px;
          background: #4a5568;
          outline: none;
          -webkit-appearance: none;
        }
        .control-group input[type="range"]::-webkit-slider-thumb {
          -webkit-appearance: none;
          width: 20px;
          height: 20px;
          border-radius: 50%;
          background: #667eea;
          cursor: pointer;
        }
        .control-group input[type="number"] {
          width: 100px;
          padding: 0.5rem;
          border: 1px solid #4a5568;
          border-radius: 0.5rem;
          background: rgba(0,0,0,0.3);
          color: #fff;
        }
        .control-group select {
          padding: 0.5rem 1rem;
          border: 1px solid #4a5568;
          border-radius: 0.5rem;
          background: rgba(0,0,0,0.3);
          color: #fff;
        }
        .row { display: flex; gap: 1rem; flex-wrap: wrap; align-items: center; }
        .btn {
          padding: 0.75rem 2rem;
          border: none;
          border-radius: 0.5rem;
          font-size: 1rem;
          cursor: pointer;
          transition: all 0.3s;
          font-weight: 600;
        }
        .btn-primary {
          background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
          color: #fff;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .preview-container {
          display: grid;
          grid-template-columns: 1fr 1fr;
          gap: 1.5rem;
          margin-top: 1.5rem;
        }
        @media (max-width: 768px) {
          .preview-container { grid-template-columns: 1fr; }
        }
        .preview-box {
          background: rgba(255,255,255,0.05);
          border-radius: 1rem;
          padding: 1rem;
          text-align: center;
        }
        .preview-box h3 { margin-bottom: 1rem; color: #a0aec0; }
        .preview-box img {
          max-width: 100%;
          max-height: 300px;
          border-radius: 0.5rem;
          object-fit: contain;
        }
        .stats {
          margin-top: 0.5rem;
          font-size: 0.9rem;
          color: #a0aec0;
        }
        .stats .reduction { color: #48bb78; font-weight: bold; }
        .loading {
          display: none;
          text-align: center;
          padding: 2rem;
        }
        .loading.active { display: block; }
        .spinner {
          width: 50px;
          height: 50px;
          border: 4px solid #4a5568;
          border-top-color: #667eea;
          border-radius: 50%;
          animation: spin 1s linear infinite;
          margin: 0 auto 1rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .hidden { display: none !important; }
        .download-btn { margin-top: 1rem; }
        .checkbox-group { display: flex; align-items: center; gap: 0.5rem; }
        .checkbox-group input[type="checkbox"] { width: 18px; height: 18px; }
      </style>
    </head>
    <body>
      <div class="container">
        <h1>🖼️ Image Compressor</h1>
        
        <div class="upload-zone" id="uploadZone">
          <input type="file" id="fileInput" accept="image/*" multiple>
          <p style="font-size: 1.2rem; margin-bottom: 0.5rem;">Drop images here or click to upload</p>
          <p style="color: #a0aec0;">Supports JPEG, PNG, WebP, GIF</p>
        </div>

        <div class="controls" id="controls">
          <div class="control-group">
            <label>Quality: <span id="qualityValue">80</span>%</label>
            <input type="range" id="quality" min="1" max="100" value="80">
          </div>
          
          <div class="control-group">
            <label>Output Format</label>
            <select id="format">
              <option value="original">Keep Original</option>
              <option value="jpeg">JPEG</option>
              <option value="png">PNG</option>
              <option value="webp" selected>WebP (Best compression)</option>
            </select>
          </div>

          <div class="control-group">
            <label>Resize (optional)</label>
            <div class="row">
              <input type="number" id="maxWidth" placeholder="Max Width" min="1">
              <span>×</span>
              <input type="number" id="maxHeight" placeholder="Max Height" min="1">
              <div class="checkbox-group">
                <input type="checkbox" id="maintainAspect" checked>
                <label for="maintainAspect">Maintain aspect ratio</label>
              </div>
            </div>
          </div>

          <div class="row" style="justify-content: center; margin-top: 1.5rem;">
            <button class="btn btn-primary" id="compressBtn">Compress Images</button>
          </div>
        </div>

        <div class="loading" id="loading">
          <div class="spinner"></div>
          <p>Compressing your images...</p>
        </div>

        <div class="preview-container hidden" id="previewContainer"></div>
      </div>

      <script>
        const uploadZone = document.getElementById('uploadZone');
        const fileInput = document.getElementById('fileInput');
        const controls = document.getElementById('controls');
        const quality = document.getElementById('quality');
        const qualityValue = document.getElementById('qualityValue');
        const format = document.getElementById('format');
        const maxWidth = document.getElementById('maxWidth');
        const maxHeight = document.getElementById('maxHeight');
        const maintainAspect = document.getElementById('maintainAspect');
        const compressBtn = document.getElementById('compressBtn');
        const loading = document.getElementById('loading');
        const previewContainer = document.getElementById('previewContainer');

        let selectedFiles = [];

        uploadZone.addEventListener('click', () => fileInput.click());
        uploadZone.addEventListener('dragover', (e) => {
          e.preventDefault();
          uploadZone.classList.add('drag-over');
        });
        uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
        uploadZone.addEventListener('drop', (e) => {
          e.preventDefault();
          uploadZone.classList.remove('drag-over');
          handleFiles(e.dataTransfer.files);
        });
        fileInput.addEventListener('change', (e) => handleFiles(e.target.files));

        quality.addEventListener('input', () => qualityValue.textContent = quality.value);

        function handleFiles(files) {
          selectedFiles = Array.from(files).filter(f => f.type.startsWith('image/'));
          if (selectedFiles.length > 0) {
            controls.classList.add('active');
            uploadZone.querySelector('p').textContent = `${selectedFiles.length} image(s) selected`;
          }
        }

        compressBtn.addEventListener('click', async () => {
          if (selectedFiles.length === 0) return;

          loading.classList.add('active');
          previewContainer.classList.add('hidden');
          previewContainer.innerHTML = '';
          compressBtn.disabled = true;

          for (const file of selectedFiles) {
            try {
              const result = await compressImage(file);
              displayResult(file, result);
            } catch (err) {
              console.error('Error compressing:', err);
            }
          }

          loading.classList.remove('active');
          previewContainer.classList.remove('hidden');
          compressBtn.disabled = false;
        });

        async function compressImage(file) {
          return new Promise((resolve) => {
            const img = new Image();
            const reader = new FileReader();

            reader.onload = (e) => {
              img.onload = () => {
                const canvas = document.createElement('canvas');
                let width = img.width;
                let height = img.height;

                const mw = parseInt(maxWidth.value) || Infinity;
                const mh = parseInt(maxHeight.value) || Infinity;

                if (maintainAspect.checked) {
                  const ratio = Math.min(mw / width, mh / height, 1);
                  width = Math.round(width * ratio);
                  height = Math.round(height * ratio);
                } else {
                  if (mw < width) width = mw;
                  if (mh < height) height = mh;
                }

                canvas.width = width;
                canvas.height = height;

                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);

                let mimeType = file.type;
                let ext = file.name.split('.').pop();
                
                if (format.value !== 'original') {
                  mimeType = `image/${format.value}`;
                  ext = format.value === 'jpeg' ? 'jpg' : format.value;
                }

                const q = parseInt(quality.value) / 100;
                
                canvas.toBlob((blob) => {
                  const newName = file.name.replace(/\.[^.]+$/, `.${ext}`);
                  resolve({
                    blob,
                    name: newName,
                    width,
                    height,
                    url: URL.createObjectURL(blob)
                  });
                }, mimeType, q);
              };
              img.src = e.target.result;
            };
            reader.readAsDataURL(file);
          });
        }

        function formatSize(bytes) {
          if (bytes < 1024) return bytes + ' B';
          if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
          return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
        }

        function displayResult(original, result) {
          const originalUrl = URL.createObjectURL(original);
          const reduction = ((1 - result.blob.size / original.size) * 100).toFixed(1);

          const html = `
            <div class="preview-box">
              <h3>Original</h3>
              <img src="${originalUrl}" alt="Original">
              <div class="stats">
                ${original.name}<br>
                Size: ${formatSize(original.size)}
              </div>
            </div>
            <div class="preview-box">
              <h3>Compressed</h3>
              <img src="${result.url}" alt="Compressed">
              <div class="stats">
                ${result.name}<br>
                Size: ${formatSize(result.blob.size)} 
                <span class="reduction">(${reduction > 0 ? '-' : '+'}${Math.abs(reduction)}%)</span><br>
                ${result.width} × ${result.height}
              </div>
              <a href="${result.url}" download="${result.name}" class="btn btn-primary download-btn">Download</a>
            </div>
          `;
          previewContainer.innerHTML += html;
        }
      </script>
    </body>
    </html>
  nginx.conf: |
    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;
        
        client_max_body_size 500M;
        
        location / {
            try_files $uri $uri/ /index.html;
        }
        
        location /health {
            return 200 'OK';
            add_header Content-Type text/plain;
        }
    }
---
apiVersion: v1
kind: Service
metadata:
  name: image-compressor
  namespace: image-compressor
spec:
  type: ClusterIP
  selector:
    app: image-compressor
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: image-compressor
  namespace: image-compressor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: image-compressor
  template:
    metadata:
      labels:
        app: image-compressor
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
      containers:
        - name: image-compressor
          image: nginx:alpine
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              memory: "256Mi"
              cpu: "500m"
          ports:
            - containerPort: 80
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: html
              mountPath: /usr/share/nginx/html
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d
            - name: tmp
              mountPath: /tmp
            - name: cache
              mountPath: /var/cache/nginx
            - name: run
              mountPath: /var/run
      volumes:
        - name: html
          configMap:
            name: image-compressor-ui
            items:
              - key: index.html
                path: index.html
        - name: nginx-conf
          configMap:
            name: image-compressor-ui
            items:
              - key: nginx.conf
                path: default.conf
        - name: tmp
          emptyDir: {}
        - name: cache
          emptyDir: {}
        - name: run
          emptyDir: {}
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: limit
  namespace: image-compressor
spec:
  buffering:
    maxRequestBodyBytes: 500000000
    memRequestBodyBytes: 500000000
    maxResponseBodyBytes: 500000000
    memResponseBodyBytes: 500000000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: image-compressor
  namespace: image-compressor
  labels:
    name: image-compressor
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: image-compressor-limit@kubernetescrd
spec:
  rules:
    - host: compress.jacobbanghart.com
      http:
        paths:
          - pathType: Prefix
            path: "/"
            backend:
              service:
                name: image-compressor
                port:
                  number: 80
