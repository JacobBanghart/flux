apiVersion: v1
kind: Namespace
metadata:
  name: openwebui
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openwebui
  namespace: openwebui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openwebui
  template:
    metadata:
      labels:
        app: openwebui
    spec:
      containers:
        - name: openwebui
          image: ghcr.io/open-webui/open-webui:main
          ports:
            - containerPort: 8080
          env:
            - name: OLLAMA_API_URL
              value: "http://ollama.ollama.svc.cluster.local:11434"
          securityContext:
            privileged: true
          volumeMounts:
            - mountPath: /dev/dri
              name: dri
      volumes:
        - name: dri
          hostPath:
            path: /dev/dri
---
apiVersion: v1
kind: Service
metadata:
  name: openwebui
  namespace: openwebui
spec:
  selector:
    app: openwebui
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: openwebui
  namespace: openwebui
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`openwebui.jacobbanghart.com`)
      kind: Rule
      services:
        - name: openwebui
          port: 8080
  tls:
    certResolver: cloudflare
