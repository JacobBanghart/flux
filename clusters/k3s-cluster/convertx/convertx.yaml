apiVersion: v1
kind: Service
metadata:
  name: convertx
  namespace: convertx
spec:
  type: ClusterIP
  selector:
    app: convertx
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: convertx
  namespace: convertx
spec:
  selector:
    matchLabels:
      app: convertx
  template:
    metadata:
      labels:
        app: convertx
    spec:
      containers:
      - name: convertx
        image: ghcr.io/c4illin/convertx
        resources:
          limits:
            memory: "500Mi"
            cpu: "1000m"
        ports:
        - containerPort: 3000
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: limit
  namespace: convertx
spec:
  buffering:
    maxRequestBodyBytes: 35000000
    memRequestBodyBytes: 35000000
    maxResponseBodyBytes: 35000000
    memResponseBodyBytes: 35000000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: convertx
  namespace: convertx
  labels:
    name: convertx
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: convertx-limit@kubernetescrd
spec:
  rules:
    - host: convertx.jacobbanghart.com
      http:
        paths:
          - pathType: Prefix
            path: "/"
            backend:
              service:
                name: convertx
                port:
                  number: 3000

