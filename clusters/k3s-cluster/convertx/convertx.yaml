apiVersion: v1
kind: Namespace
metadata:
  name: convertx
---
apiVersion: v1
kind: Service
metadata:
  name: convertx
  namespace: convertx
spec:
  type: ClusterIP
  selector:
    app: convertx
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: convertx
  namespace: convertx
spec:
  selector:
    matchLabels:
      app: convertx
  template:
    metadata:
      labels:
        app: convertx
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: convertx
          image: ghcr.io/c4illin/convertx:v0.15.1
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: "100m"
              memory: "100Mi"
            limits:
              memory: "500Mi"
              cpu: "1000m"
          ports:
            - containerPort: 3000
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: convertx-db
              mountPath: /app/data
      volumes:
        - name: convertx-db
          emptyDir: {}
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: limit
  namespace: convertx
spec:
  buffering:
    maxRequestBodyBytes: 350000000
    memRequestBodyBytes: 350000000
    maxResponseBodyBytes: 350000000
    memResponseBodyBytes: 350000000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: convertx
  namespace: convertx
  labels:
    name: convertx
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: convertx-limit@kubernetescrd
spec:
  rules:
    - host: convertx.jacobbanghart.com
      http:
        paths:
          - pathType: Prefix
            path: "/"
            backend:
              service:
                name: convertx
                port:
                  number: 3000
