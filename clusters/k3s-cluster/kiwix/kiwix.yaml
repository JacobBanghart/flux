apiVersion: v1
kind: Namespace
metadata:
  name: kiwix
---
apiVersion: v1
kind: Service
metadata:
  name: kiwix
  namespace: kiwix
spec:
  type: ClusterIP
  ports:
    - port: 8040
      targetPort: 8040
---
apiVersion: v1
kind: Endpoints
metadata:
  name: kiwix
  namespace: kiwix
subsets:
  - addresses:
      - ip: 192.168.1.99
    ports:
      - port: 8040
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kiwix
  namespace: kiwix
  labels:
    name: kiwix
spec:
  rules:
    - host: kiwix.jacobbanghart.com
      http:
        paths:
          - pathType: Prefix
            path: "/"
            backend:
              service:
                name: kiwix
                port:
                  number: 8040
