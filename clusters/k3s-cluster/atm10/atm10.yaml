apiVersion: v1
kind: Namespace
metadata:
  name: atm10
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: atm10-pvc
  namespace: atm10
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 100Gi
  storageClassName: nfs-rwx-ephemeral
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: atm10
  namespace: atm10
spec:
  replicas: 0
  revisionHistoryLimit: 2
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: atm10
  template:
    metadata:
      labels:
        app: atm10
    spec:
      containers:
        - name: minecraft
          image: itzg/minecraft-server:java21
          imagePullPolicy: Always
          stdin: true
          tty: true
          resources:
            requests:
              cpu: "4"
              memory: "12Gi"
            limits:
              cpu: "12"
              memory: "24Gi"
          ports:
            - containerPort: 25565
              protocol: TCP
          env:
            - name: EULA
              value: "TRUE"
            - name: MODPACK_PLATFORM
              value: "AUTO_CURSEFORGE"
            - name: CF_API_KEY
              valueFrom:
                secretKeyRef:
                  name: curseforge-api-key
                  key: CF_API_KEY
            - name: CF_PAGE_URL
              value: "https://www.curseforge.com/minecraft/modpacks/all-the-mods-10"
            - name: CF_FILENAME_MATCHER
              value: "5.4"
            - name: MODE
              value: "survival"
            - name: ALLOW_FLIGHT
              value: "TRUE"
            - name: OPS
              value: "Jqwop"
            - name: INIT_MEMORY
              value: "12G"
            - name: MAX_MEMORY
              value: "20G"
            - name: JVM_XX_OPTS
              value: "-XX:ParallelGCThreads=10 -XX:ConcGCThreads=5"
            - name: USE_AIKAR_FLAGS
              value: "true"
          volumeMounts:
            - mountPath: /data
              name: atm10-pvc
      volumes:
        - name: atm10-pvc
          persistentVolumeClaim:
            claimName: atm10-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: atm10
  namespace: atm10
  annotations:
    external-dns.alpha.kubernetes.io/hostname: atm10.jacobbanghart.com
spec:
  type: LoadBalancer
  selector:
    app: atm10
  ports:
    - port: 25565
      targetPort: 25565
      protocol: TCP
      name: minecraft
