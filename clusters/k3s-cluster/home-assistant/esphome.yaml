apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: esphome-config-pvc
  namespace: home-assistant
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: nfs-rwx
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: esphome
  namespace: home-assistant
  labels:
    app: esphome
spec:
  ports:
    - port: 6052
      targetPort: 6052
      name: http
  selector:
    app: esphome
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: esphome
  namespace: home-assistant
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: esphome
  template:
    metadata:
      labels:
        app: esphome
    spec:
      # Host network for mDNS discovery and OTA updates
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: esphome
          image: ghcr.io/esphome/esphome:latest
          ports:
            - containerPort: 6052
              name: http
          env:
            - name: TZ
              value: "America/Chicago"
            - name: ESPHOME_DASHBOARD_USE_PING
              value: "true"
          volumeMounts:
            - name: config
              mountPath: /config
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: esphome-config-pvc
# Access ESPHome locally only: http://10.1.0.34:6052
