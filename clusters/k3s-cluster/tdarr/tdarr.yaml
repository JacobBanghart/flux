apiVersion: v1
kind: Namespace
metadata:
  name: tdarr
  labels:
    name: tdarr
---
# PVC for Config (dynamic)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tdarr-config-pvc
  namespace: tdarr
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 10Gi
  storageClassName: nfs-rwx
---
# PVC for Cache (dynamic)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tdarr-cache-pvc
  namespace: tdarr
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 100Gi
  storageClassName: nfs-rwx
---
# PV for Movies (static - existing Jellyfin share)
apiVersion: v1
kind: PersistentVolume
metadata:
  name: tdarr-movies-pv
spec:
  capacity:
    storage: 4Ti
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  nfs:
    server: truenas.home
    path: /mnt/BasicPool/Jellyfin/movies
---
# PV for TV (static - existing Jellyfin share)
apiVersion: v1
kind: PersistentVolume
metadata:
  name: tdarr-tv-pv
spec:
  capacity:
    storage: 4Ti
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  nfs:
    server: truenas.home
    path: /mnt/BasicPool/Jellyfin/tv
---
# PVC for Movies
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tdarr-movies-pvc
  namespace: tdarr
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 4Ti
  volumeName: tdarr-movies-pv
  storageClassName: ""
---
# PVC for TV
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tdarr-tv-pvc
  namespace: tdarr
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 4Ti
  volumeName: tdarr-tv-pv
  storageClassName: ""
---
# Service
apiVersion: v1
kind: Service
metadata:
  name: tdarr
  namespace: tdarr
spec:
  selector:
    app: tdarr
  ports:
    - name: webui
      port: 8265
      targetPort: 8265
    - name: server
      port: 8266
      targetPort: 8266
---
# Ingress - External
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tdarr
  namespace: tdarr
spec:
  rules:
    - host: tdarr.jacobbanghart.com
      http:
        paths:
          - pathType: Prefix
            path: "/"
            backend:
              service:
                name: tdarr
                port:
                  number: 8265
---
# Ingress - Local
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tdarr-local
  namespace: tdarr
spec:
  rules:
    - host: tdarr.local
      http:
        paths:
          - pathType: Prefix
            path: "/"
            backend:
              service:
                name: tdarr
                port:
                  number: 8265
---
# Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tdarr
  namespace: tdarr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tdarr
  template:
    metadata:
      labels:
        app: tdarr
    spec:
      containers:
        - name: tdarr
          image: ghcr.io/haveagitgat/tdarr:latest
          securityContext:
            privileged: true
          ports:
            - containerPort: 8265
            - containerPort: 8266
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: "America/Chicago"
            - name: serverIP
              value: "0.0.0.0"
            - name: serverPort
              value: "8266"
            - name: webUIPort
              value: "8265"
            - name: internalNode
              value: "true"
            - name: inContainer
              value: "true"
            - name: ffmpegVersion
              value: "6"
            - name: nodeName
              value: "tdarr-gpu"
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "4"
              memory: "4Gi"
          volumeMounts:
            - mountPath: /app/server
              name: config
              subPath: server
            - mountPath: /app/configs
              name: config
              subPath: configs
            - mountPath: /app/logs
              name: config
              subPath: logs
            - mountPath: /media/movies
              name: movies
            - mountPath: /media/tv
              name: tv
            - mountPath: /temp
              name: cache
            - mountPath: /dev/dri
              name: dri
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: tdarr-config-pvc
        - name: movies
          persistentVolumeClaim:
            claimName: tdarr-movies-pvc
        - name: tv
          persistentVolumeClaim:
            claimName: tdarr-tv-pvc
        - name: cache
          persistentVolumeClaim:
            claimName: tdarr-cache-pvc
        - name: dri
          hostPath:
            path: /dev/dri
