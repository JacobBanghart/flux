apiVersion: v1
kind: Namespace
metadata:
  name: load-test
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: k6-quikdry-script
  namespace: load-test
data:
  loadtest.js: |
    import http from 'k6/http';
    import { sleep } from 'k6';

    const pages = [
      'https://www.quikdrycarpetcleaning.com/',
      'https://www.quikdrycarpetcleaning.com/carpet-cleaning/',
      'https://www.quikdrycarpetcleaning.com/tile-grout-cleaning/',
      'https://www.quikdrycarpetcleaning.com/upholstery-cleaning/',
      'https://www.quikdrycarpetcleaning.com/about/',
      'https://www.quikdrycarpetcleaning.com/faq/',
    ];

    export const options = {
      discardResponseBodies: true,
      scenarios: {
        breaking_point: {
          executor: 'ramping-vus',
          startVUs: 0,
          stages: [
            { duration: '1m', target: 50 },
            { duration: '2m', target: 50 },
            { duration: '1m', target: 100 },
            { duration: '2m', target: 100 },
            { duration: '1m', target: 250 },
            { duration: '2m', target: 250 },
            { duration: '1m', target: 500 },
            { duration: '2m', target: 500 },
            { duration: '1m', target: 1000 },
            { duration: '2m', target: 1000 },
            { duration: '1m', target: 2000 },
            { duration: '2m', target: 2000 },
            { duration: '1m', target: 5000 },
            { duration: '2m', target: 5000 },
          ],
          gracefulRampDown: '30s',
        },
      },
      thresholds: {
        http_req_failed: [{ threshold: 'rate<0.5', abortOnFail: true, delayAbortEval: '10s' }],
        http_req_duration: [{ threshold: 'p(95)<10000', abortOnFail: true, delayAbortEval: '10s' }],
      },
    };

    export default function () {
      const url = pages[Math.floor(Math.random() * pages.length)];
      http.get(url);
      sleep(1);
    }
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: k6-quikdry-loadtest
  namespace: load-test
spec:
  schedule: "0 20 * * *"
  timeZone: "America/Chicago"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 0
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: k6
              image: grafana/k6:latest
              args: ["run", "/scripts/loadtest.js"]
              resources:
                requests:
                  cpu: "8"
                  memory: "8Gi"
                limits:
                  cpu: "32"
                  memory: "32Gi"
              volumeMounts:
                - name: script
                  mountPath: /scripts
          volumes:
            - name: script
              configMap:
                name: k6-quikdry-script
