apiVersion: v1
kind: Namespace
metadata:
  name: mysql-system
---
# Root password secret - create manually:
# kubectl create secret generic mysql-root-credentials -n mysql-system --from-literal=password=<your-secure-password>
# Secret already created - stored in your secure storage
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-config
  namespace: mysql-system
data:
  my.cnf: |
    [mysqld]
    # Performance
    max_connections = 200
    innodb_buffer_pool_size = 256M

    # Character set
    character-set-server = utf8mb4
    collation-server = utf8mb4_unicode_ci

    # TLS - require secure connections
    require_secure_transport = ON

    # Logging
    log_error = /var/log/mysql/error.log
    slow_query_log = 1
    slow_query_log_file = /var/log/mysql/slow.log
    long_query_time = 2
---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: mysql-system
  labels:
    app: mysql
spec:
  type: ClusterIP
  ports:
    - port: 3306
      targetPort: 3306
      protocol: TCP
      name: mysql
  selector:
    app: mysql
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql
  namespace: mysql-system
  labels:
    app: mysql
spec:
  serviceName: mysql
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.0.40
          ports:
            - containerPort: 3306
              name: mysql
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-root-credentials
                  key: password
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
            - name: mysql-config
              mountPath: /etc/mysql/conf.d
            - name: mysql-logs
              mountPath: /var/log/mysql
            - name: mysql-tls
              mountPath: /var/lib/mysql-tls
              readOnly: true
          args:
            - --default-authentication-plugin=mysql_native_password
            - --ssl-ca=/var/lib/mysql-tls/ca.pem
            - --ssl-cert=/var/lib/mysql-tls/server-cert.pem
            - --ssl-key=/var/lib/mysql-tls/server-key.pem
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            exec:
              command:
                - mysqladmin
                - ping
                - -h
                - localhost
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - mysqladmin
                - ping
                - -h
                - localhost
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: mysql-config
          configMap:
            name: mysql-config
        - name: mysql-logs
          emptyDir: {}
        - name: mysql-tls
          secret:
            secretName: mysql-tls-certs
  volumeClaimTemplates:
    - metadata:
        name: mysql-data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: nfs-rwx
        resources:
          requests:
            storage: 20Gi
---
# Job to generate self-signed TLS certificates for MySQL
apiVersion: batch/v1
kind: Job
metadata:
  name: mysql-generate-tls
  namespace: mysql-system
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: generate-certs
          image: bitnami/kubectl:latest
          command:
            - /bin/bash
            - -c
            - |
              set -e

              # Check if secret already exists
              if kubectl get secret mysql-tls-certs -n mysql-system 2>/dev/null; then
                echo "TLS secret already exists, skipping generation"
                exit 0
              fi

              cd /tmp

              # Generate CA
              openssl genrsa 2048 > ca-key.pem
              openssl req -new -x509 -nodes -days 3650 -key ca-key.pem -out ca.pem \
                -subj "/CN=MySQL-CA"

              # Generate server certificate
              openssl req -newkey rsa:2048 -nodes -keyout server-key.pem -out server-req.pem \
                -subj "/CN=mysql.mysql-system.svc.cluster.local"
              openssl x509 -req -in server-req.pem -days 3650 -CA ca.pem -CAkey ca-key.pem \
                -set_serial 01 -out server-cert.pem

              # Generate client certificate
              openssl req -newkey rsa:2048 -nodes -keyout client-key.pem -out client-req.pem \
                -subj "/CN=MySQL-Client"
              openssl x509 -req -in client-req.pem -days 3650 -CA ca.pem -CAkey ca-key.pem \
                -set_serial 02 -out client-cert.pem

              # Create Kubernetes secret
              kubectl create secret generic mysql-tls-certs -n mysql-system \
                --from-file=ca.pem \
                --from-file=server-cert.pem \
                --from-file=server-key.pem \
                --from-file=client-cert.pem \
                --from-file=client-key.pem

              echo "TLS certificates generated and stored in secret"
      serviceAccountName: mysql-tls-generator
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mysql-tls-generator
  namespace: mysql-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: mysql-tls-generator-role
  namespace: mysql-system
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: mysql-tls-generator-rolebinding
  namespace: mysql-system
subjects:
  - kind: ServiceAccount
    name: mysql-tls-generator
    namespace: mysql-system
roleRef:
  kind: Role
  name: mysql-tls-generator-role
  apiGroup: rbac.authorization.k8s.io
