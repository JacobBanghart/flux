apiVersion: v1
kind: Namespace
metadata:
  name: files
---
apiVersion: v1
kind: Service
metadata:
  name: files
  namespace: files
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: v1
kind: Endpoints
metadata:
  name: files
  namespace: files
subsets:
  - addresses:
      - ip: 192.168.1.99
    ports:
      - port: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: files
  namespace: files
  labels:
    name: files
spec:
  rules:
    - host: files.jacobbanghart.com
      http:
        paths:
          - pathType: Prefix
            path: "/"
            backend:
              service:
                name: files
                port:
                  number: 8080