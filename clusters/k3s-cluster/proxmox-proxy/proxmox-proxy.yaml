# ---
# # =============================================================================
# # Proxmox VM Dynamic Proxy
# # =============================================================================
# # Provides EC2-style automatic DNS access to Proxmox VMs
# #
# # How it works:
# #   1. Wildcard DNS: *.vm.jacobbanghart.com → this proxy (via external-dns)
# #   2. Wildcard TLS: cert-manager issues *.vm.jacobbanghart.com cert
# #   3. Dynamic routing: subdomain encodes the VM IP
# #
# # URL patterns:
# #   - vm-10-1-0-50.vm.jacobbanghart.com      → 10.1.0.50:80 (HTTP)
# #   - vm-10-1-0-50-8080.vm.jacobbanghart.com → 10.1.0.50:8080 (custom port)
# #   - vm-10-1-0-50-ssh.vm.jacobbanghart.com  → 10.1.0.50:22 (SSH over WebSocket)
# #
# # Allowed IP ranges (configurable):
# #   - 10.1.0.0/24 (Primary network)
# #   - 10.2.0.0/24 (Friend network) 
# #   - 10.3.0.0/24 (IoT network)
# # =============================================================================
# apiVersion: v1
# kind: Namespace
# metadata:
#   name: proxmox-proxy
# ---
# # =============================================================================
# # Wildcard Certificate for *.vm.jacobbanghart.com
# # =============================================================================
# apiVersion: v1
# kind: Secret
# metadata:
#   name: vm-wildcard-cert
#   namespace: proxmox-proxy
#   annotations:
#     # This tells Traefik to use this cert for matching domains
#     traefik.ingress.kubernetes.io/router.tls: "true"
# type: kubernetes.io/tls
# data:
#   # Placeholder - Traefik will populate via ACME
#   tls.crt: ""
#   tls.key: ""
# ---
