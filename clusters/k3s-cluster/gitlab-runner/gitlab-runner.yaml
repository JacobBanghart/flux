---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: gitlab
  namespace: flux-system
spec:
  interval: 1h
  url: https://charts.gitlab.io
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gitlab-runner
  namespace: gitlab-runner
spec:
  interval: 10m
  chart:
    spec:
      chart: gitlab-runner
      version: "0.85.0"
      sourceRef:
        kind: HelmRepository
        name: gitlab
        namespace: flux-system
  valuesFrom:
    - kind: ConfigMap
      name: gitlab-runner-values
      valuesKey: values.yaml
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gitlab-runner-values
  namespace: gitlab-runner
data:
  values.yaml: |
    gitlabUrl: https://gitlab.com

    podAnnotations:
      prometheus.io/scrape: "true"
      prometheus.io/port: "9252"
      prometheus.io/path: "/metrics"

    # Expose metrics listener on :9252
    metrics:
      enabled: true
      serviceMonitor:
        enabled: false

    # Run 1 runner replica
    replicas: 1

    # Reduce log verbosity
    logLevel: warn

    # Only 2 concurrent jobs - more resources per job for faster Go builds
    concurrent: 2

    runners:
      secret: gitlab-runner-secret

      config: |
        [[runners]]
          name = "k3s-cluster-runner"
          url = "https://gitlab.com"
          executor = "kubernetes"
          # Log level for the runner
          log_level = "warn"
          [runners.kubernetes]
            namespace = "gitlab-runner"
            image = "alpine:latest"
            privileged = false
            # Poll interval - less chatty logs
            poll_interval = 3
            poll_timeout = 180
            [[runners.kubernetes.volumes.empty_dir]]
              name = "docker-certs"
              mount_path = "/certs/client"
              medium = "Memory"
            [[runners.kubernetes.volumes.empty_dir]]
              name = "cache"
              mount_path = "/cache"
            [runners.kubernetes.pod_labels]
              "gitlab-runner" = "true"
            [runners.kubernetes.node_selector]
              "kubernetes.io/os" = "linux"
            # Build pod resources - 2 jobs x 2 CPU = 4 CPU reserved
            # Go builds benefit from more CPU (parallel compilation)
            [runners.kubernetes.build_container_requests]
              cpu = "2"
              memory = "2Gi"
            [runners.kubernetes.build_container_limits]
              cpu = "4"
              memory = "6Gi"
            [runners.kubernetes.helper_container_requests]
              cpu = "100m"
              memory = "128Mi"
            [runners.kubernetes.helper_container_limits]
              cpu = "500m"
              memory = "512Mi"
          [runners.cache]
            Type = "local"
            Path = "/cache"

    resources:
      limits:
        cpu: 200m
        memory: 256Mi
      requests:
        cpu: 100m
        memory: 128Mi

    rbac:
      create: true

    serviceAccount:
      create: true
      name: gitlab-runner
