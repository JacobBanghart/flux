---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: gitlab
  namespace: flux-system
spec:
  interval: 1h
  url: https://charts.gitlab.io
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gitlab-runner
  namespace: gitlab-runner
spec:
  interval: 10m
  chart:
    spec:
      chart: gitlab-runner
      version: "0.71.0"  # Latest stable
      sourceRef:
        kind: HelmRepository
        name: gitlab
        namespace: flux-system
  valuesFrom:
    - kind: ConfigMap
      name: gitlab-runner-values
      valuesKey: values.yaml
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gitlab-runner-values
  namespace: gitlab-runner
data:
  values.yaml: |
    gitlabUrl: https://gitlab.com
    
    runners:
      secret: gitlab-runner-secret
      
      config: |
        [[runners]]
          name = "k3s-cluster-runner"
          url = "https://gitlab.com"
          executor = "kubernetes"
          [runners.kubernetes]
            namespace = "gitlab-runner"
            image = "alpine:latest"
            privileged = false
            [[runners.kubernetes.volumes.empty_dir]]
              name = "docker-certs"
              mount_path = "/certs/client"
              medium = "Memory"
            [[runners.kubernetes.volumes.empty_dir]]
              name = "cache"
              mount_path = "/cache"
            [runners.kubernetes.pod_labels]
              "gitlab-runner" = "true"
            [runners.kubernetes.node_selector]
              "kubernetes.io/os" = "linux"
            [runners.kubernetes.build_container_limits]
              cpu = "2"
              memory = "4Gi"
            [runners.kubernetes.helper_container_limits]
              cpu = "500m"
              memory = "512Mi"
          [runners.cache]
            Type = "local"
            Path = "/cache"
    
    resources:
      limits:
        cpu: 200m
        memory: 256Mi
      requests:
        cpu: 100m
        memory: 128Mi
    
    rbac:
      create: true
    
    serviceAccount:
      create: true
      name: gitlab-runner
