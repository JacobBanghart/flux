apiVersion: v1
kind: Namespace
metadata:
  name: traefik
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: traefik
  namespace: traefik
spec:
  interval: 1h
  url: https://traefik.github.io/charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: traefik
spec:
  interval: 10m
  chart:
    spec:
      chart: traefik
      version: "33.2.1"
      sourceRef:
        kind: HelmRepository
        name: traefik
      interval: 10m
  # Adopt existing resources from manual helm install
  install:
    crds: Skip
    remediation:
      retries: 3
  upgrade:
    crds: Skip
    remediation:
      retries: 3
  values:
    # Use existing secrets - DO NOT create new ones
    # Secrets managed separately: cloudflare-credentials, basic-auth-secret

    ingressClass:
      enabled: true
      isDefaultClass: true

    ingressRoute:
      dashboard:
        enabled: true
        middlewares:
          - name: basic-auth

    logs:
      general:
        level: DEBUG

    ports:
      web:
        redirectTo:
          port: websecure
      websecure:
        tls:
          enabled: true
          certResolver: cloudflare

    persistence:
      enabled: true
      name: ssl-certs
      path: /ssl-certs
      size: 1Gi
      # Use existing PVC
      existingClaim: traefik

    env:
      - name: CF_API_EMAIL
        valueFrom:
          secretKeyRef:
            name: cloudflare-credentials
            key: email
      - name: CF_API_KEY
        valueFrom:
          secretKeyRef:
            name: cloudflare-credentials
            key: apiKey

    additionalArguments:
      - "--certificatesresolvers.cloudflare.acme.dnschallenge.provider=cloudflare"
      - "--certificatesresolvers.cloudflare.acme.email=jacobmbanghart@gmail.com"
      - "--certificatesresolvers.cloudflare.acme.dnschallenge.resolvers=1.1.1.1"
      - "--certificatesresolvers.cloudflare.acme.storage=/ssl-certs/acme-cloudflare.json"

    deployment:
      labels:
        release: prometheus
      podLabels:
        release: prometheus
      podAnnotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9100"
        prometheus.io/path: /metrics
      initContainers:
        - name: volume-permissions
          image: busybox:1.31.1
          command:
            - sh
            - -c
            - chmod -Rv 600 /ssl-certs/* || echo oops
          volumeMounts:
            - name: ssl-certs
              mountPath: /ssl-certs

    metrics:
      prometheus:
        addEntryPointsLabels: true
        addRoutersLabels: true
        addServicesLabels: true
