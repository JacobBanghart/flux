apiVersion: v1
kind: Namespace
metadata:
  name: ollama
---
apiVersion: source.toolkit.fluxcd.io/v1beta1
kind: HelmRepository
metadata:
  name: ollama
  namespace: ollama
spec:
  interval: 5m
  url: https://otwld.github.io/ollama-helm/
---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: ollama
  namespace: ollama
spec:
  interval: 5m
  chart:
    spec:
      chart: ollama
      version: 1.4.0
      sourceRef:
        kind: HelmRepository
        name: ollama
      interval: 5m
  values:
    ingress:
      enabled: true
      hosts:
      - host: ollama.jacobbanghart.com
        paths:
          - path: /
            pathType: Prefix
