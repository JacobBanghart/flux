---
# Traefik Middleware — pass WebSocket upgrade headers through to noVNC console
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: websocket-headers
  namespace: kubevirt-manager
spec:
  headers:
    customRequestHeaders:
      X-Forwarded-Proto: "https"

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kubevirt-manager
  namespace: kubevirt-manager
  annotations:
    # Enable WebSocket middleware for noVNC console support
    traefik.ingress.kubernetes.io/router.middlewares: kubevirt-manager-websocket-headers@kubernetescrd
spec:
  rules:
    - host: kubevirt.jacobbanghart.com
      http:
        paths:
          - pathType: Prefix
            path: "/"
            backend:
              service:
                name: kubevirt-manager
                port:
                  number: 8080
