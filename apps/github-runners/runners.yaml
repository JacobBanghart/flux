---
# Shared runner for all jacobmbanghart repos
# Docker enabled to support image builds (wordpress-saas-portal)
apiVersion: actions.summerwind.dev/v1alpha1
kind: RunnerDeployment
metadata:
  name: shared-runner
  namespace: actions-runner-system
spec:
  replicas: 1
  template:
    spec:
      organization: jacobmbanghart
      labels:
        - self-hosted
        - linux
      dockerEnabled: true
      resources:
        limits:
          cpu: "16"
          memory: 24Gi
        requests:
          cpu: "100m"
          memory: 128Mi
      ephemeral: true
---
# Scales 1→8 based on queued/in-progress jobs across all repos
apiVersion: actions.summerwind.dev/v1alpha1
kind: HorizontalRunnerAutoscaler
metadata:
  name: shared-runner-autoscaler
  namespace: actions-runner-system
spec:
  scaleTargetRef:
    name: shared-runner
  minReplicas: 1
  maxReplicas: 8
  metrics:
    - type: TotalNumberOfQueuedAndInProgressWorkflowRuns
      repositoryNames:
        - wordpress-saas-portal
        - simic-systems-home
        - BackToSafety
